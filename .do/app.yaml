name: agentic-brain
region: syd  # Sydney

services:
  - name: api
    dockerfile_path: Dockerfile
    github:
      repo: joseph-webber/agentic-brain
      branch: main
      deploy_on_push: true
    http_port: 8000
    instance_count: 2
    instance_size_slug: basic-s
    health_check:
      http_path: /health
    envs:
      - key: NEO4J_URI
        scope: RUN_TIME
        value: ${neo4j.DATABASE_URL}
      - key: REDIS_URL
        scope: RUN_TIME
        value: ${redis.DATABASE_URL}
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET

databases:
  - name: redis
    engine: REDIS
    production: true
    cluster_name: agentic-brain-redis

  - name: neo4j
    engine: MONGODB  # Use managed graph or external Neo4j
    production: true
