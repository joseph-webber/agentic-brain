# =============================================================================
# Agentic Brain - Complete Docker Compose Stack
# =============================================================================
# Just run: docker compose up -d
#
# Works on: Windows, macOS, and Linux
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Agentic Brain API - Main Application
  # ---------------------------------------------------------------------------
  agentic-brain:
    build:
      context: .
      dockerfile: Dockerfile
      target: development  # Use 'production' for prod builds
    container_name: agentic-brain
    env_file:
      - .env.docker
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      # App config
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-true}
      
      # Neo4j connection
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-Brain2026}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      
      # Redis connection (DOCKER NETWORKING FIX)
      # Use 'redis' hostname for Docker-to-Docker networking, not 'localhost'
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-BrainRedis2026}
      REDIS_DB: ${REDIS_DB:-0}
      CACHE_BACKEND: redis
      CACHE_REDIS_URL: redis://:${REDIS_PASSWORD:-BrainRedis2026}@redis:6379/0
      
      # Kafka/Redpanda connection
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      
      # Security & Authentication
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-key-change-in-production}
      
      # Logging
      OBSERVABILITY_LOG_LEVEL: ${LOG_LEVEL:-INFO}
      OBSERVABILITY_LOG_FORMAT: ${LOG_FORMAT:-text}
      
      # =======================================================================
      # ⚠️  SSL/TLS SETTINGS FOR CORPORATE NETWORKS - DEVELOPMENT ONLY ⚠️
      # =======================================================================
      # If your corporate proxy intercepts SSL (causes SSLCertVerificationError),
      # set these in your .env.docker file:
      #   PYTHONHTTPSVERIFY=0
      #   SSL_VERIFY=false
      #
      # WARNING: This disables certificate verification! Only use for development
      # behind corporate proxies. Never use in production with real API keys!
      # =======================================================================
      SSL_CERT_FILE: ${SSL_CERT_FILE:-}
      REQUESTS_CA_BUNDLE: ${REQUESTS_CA_BUNDLE:-}
      CURL_CA_BUNDLE: ${CURL_CA_BUNDLE:-}
      PYTHONHTTPSVERIFY: ${PYTHONHTTPSVERIFY:-1}
      SSL_VERIFY: ${SSL_VERIFY:-true}
      
      # Local LLM (Ollama) - connects to host or ollama container
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - brain-network
    volumes:
      # Mount source for hot-reload in development (writable for app operation)
      - ./src:/app/src

  # ---------------------------------------------------------------------------
  # Neo4j - Graph Database with GDS 2.27.0 and APOC plugins
  # Neo4j 2026.02.3-community with manually installed GDS (community edition compatible)
  # ---------------------------------------------------------------------------
  neo4j:
    build:
      context: .
      dockerfile: Dockerfile.neo4j
    container_name: agentic-brain-neo4j
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"  # Browser/HTTP
      - "${NEO4J_BOLT_PORT:-7687}:7687"  # Bolt protocol
    environment:
      # Auth - uses defaults if not set
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-Brain2026}
      
      # Enable both APOC and GDS plugins
      # GDS 2.27.0 is manually installed in Dockerfile.neo4j
      # APOC is auto-installed via this environment variable
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      
      # =======================================================================
      # MEMORY SETTINGS - Neo4j 5.x syntax (NOT 4.x!)
      # =======================================================================
      # WARNING: Neo4j 5.x renamed ALL dbms.* settings to server.*
      # Old: dbms.memory.heap.max_size  (4.x - WILL FAIL!)
      # New: server.memory.heap.max_size (5.x - USE THIS!)
      # =======================================================================
      NEO4J_server_memory_heap_initial__size: ${NEO4J_HEAP_INIT:-256m}
      NEO4J_server_memory_heap_max__size: ${NEO4J_HEAP_MAX:-512m}
      NEO4J_server_memory_pagecache_size: ${NEO4J_PAGECACHE:-256m}
      
      # Allow binding to all interfaces
      NEO4J_server_default__listen__address: "0.0.0.0"
      
      # APOC and GDS config - unrestricted for core functionality
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - brain-network

  # ---------------------------------------------------------------------------
  # Redis - Cache and Message Broker
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: agentic-brain-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-BrainRedis2026}
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-BrainRedis2026}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - brain-network

  # ---------------------------------------------------------------------------
  # Redpanda - Kafka-compatible Event Bus
  # NOTE: Configured for Windows, macOS, and Linux compatibility
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: agentic-brain-redpanda
    ports:
      - "${KAFKA_PORT:-9092}:9092"      # Kafka API
      - "${PANDAPROXY_PORT:-18082}:8082" # HTTP Proxy (changed to 18082 to avoid conflicts!)
      - "${ADMIN_PORT:-9644}:9644"      # Admin API
    environment:
      # Enable development mode to bypass AIO limitations on Windows/Docker Desktop
      # This allows Redpanda to run on all platforms without AIO errors
      REDPANDA_DEVELOPER_MODE: "true"
    command:
      - redpanda
      - start
      - --mode=dev-container
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --kafka-addr=internal://0.0.0.0:29092,external://0.0.0.0:9092
      - --advertise-kafka-addr=internal://redpanda:29092,external://localhost:9092
      - --pandaproxy-addr=internal://0.0.0.0:8082,external://0.0.0.0:8082
      - --advertise-pandaproxy-addr=internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr=internal://0.0.0.0:8081,external://0.0.0.0:8081
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - brain-network

  # ==========================================================================
  # OLLAMA - LOCAL LLM SERVICE (OPTIONAL)
  # ==========================================================================
  # Provides local LLM inference - no API keys needed!
  # GPU acceleration: Works with NVIDIA (Linux) and CPU fallback
  # 
  # Start with: docker compose --profile ollama up -d
  # Test with:  curl http://localhost:11434/api/tags
  # ==========================================================================
  ollama:
    image: ollama/ollama:latest
    container_name: agentic-ollama
    profiles:
      - ollama
      - full
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    # Uncomment for NVIDIA GPU support on Linux:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

# =============================================================================
# Volumes - Persistent data storage
# =============================================================================
volumes:
  neo4j_data:
    name: agentic-brain-neo4j-data
  neo4j_logs:
    name: agentic-brain-neo4j-logs
  neo4j_plugins:
    name: agentic-brain-neo4j-plugins
  redis_data:
    name: agentic-brain-redis-data
  redpanda_data:
    name: agentic-brain-redpanda-data
  ollama_data:
    driver: local

# =============================================================================
# Networks
# =============================================================================
networks:
  brain-network:
    name: agentic-brain-network
    driver: bridge
