apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agentic-brain
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: agentic-brain.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agentic-brain
                port:
                  number: 80
