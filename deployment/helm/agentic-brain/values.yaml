replicaCount: 2

image:
  repository: ghcr.io/joseph-webber/agentic-brain
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

env:
  NEO4J_URI: "bolt://neo4j:7687"
  SESSION_BACKEND: "redis"

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: agentic-brain.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}
