apiVersion: v1
kind: Secret
metadata:
  name: {{ include "agentic-brain.secretsName" . }}
  labels:
    {{- include "agentic-brain.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Neo4j Credentials
  NEO4J_PASSWORD: {{ required "neo4j.password is required" .Values.neo4j.password | quote }}
  
  # Redis Credentials
  REDIS_URL: {{ .Values.redis.url | quote }}
  {{- if .Values.redis.password }}
  REDIS_PASSWORD: {{ .Values.redis.password | quote }}
  {{- end }}
  
  # JWT Secret
  {{- if .Values.auth.enabled }}
  JWT_SECRET: {{ required "auth.jwtSecret is required when auth.enabled=true" .Values.auth.jwtSecret | quote }}
  {{- end }}
  
  # API Keys
  {{- if .Values.auth.apiKeys }}
  API_KEYS: {{ .Values.auth.apiKeys | join "," | quote }}
  {{- end }}
  
  # LLM API Keys
  {{- if .Values.llm.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.llm.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.llm.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.llm.anthropicApiKey | quote }}
  {{- end }}
