services:
  # Agentic Brain API (development with hot reload)
  agentic-brain:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: agentic-brain-dev
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    environment:
      ENVIRONMENT: dev
      DEBUG: "true"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      CACHE_BACKEND: redis
      CACHE_REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
      OBSERVABILITY_LOG_LEVEL: ${OBSERVABILITY_LOG_LEVEL:-DEBUG}
      OBSERVABILITY_LOG_FORMAT: ${OBSERVABILITY_LOG_FORMAT:-console}
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      - agentic-brain-network

  # Neo4j Graph Database (development)
  neo4j:
    image: neo4j:5.15-community
    container_name: agentic-brain-neo4j-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: 512m
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data_dev:/data
      - neo4j_logs_dev:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - agentic-brain-network

  # Redis Cache (development)
  redis:
    image: redis:7-alpine
    container_name: agentic-brain-redis-dev
    restart: unless-stopped
    env_file:
      - .env.docker
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    networks:
      - agentic-brain-network

  # Redpanda (Kafka-compatible event bus, development)
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: agentic-brain-redpanda-dev
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 1G
      - --overprovisioned
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    volumes:
      - redpanda_data_dev:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - agentic-brain-network

volumes:
  neo4j_data_dev:
  neo4j_logs_dev:
  redis_data_dev:
  redpanda_data_dev:

networks:
  agentic-brain-network:
    driver: bridge
