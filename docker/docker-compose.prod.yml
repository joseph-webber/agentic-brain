# Agentic Brain - Production Docker Compose
# JHipster-style multi-service configuration
#
# Usage (recommended):
#   docker compose --env-file .env.prod -f docker/docker-compose.prod.yml up -d
#
# Required env vars:
#   - NEO4J_PASSWORD
#   - JWT_SECRET
#   - REDIS_PASSWORD
#
# Production features:
#   - Multi-worker deployment
#   - TLS/SSL ready
#   - Resource limits
#   - Persistent volumes
#   - Health monitoring

services:
  agentic-brain:
    image: ghcr.io/joseph-webber/agentic-brain:latest
    container_name: agentic-brain-prod
    env_file:
      - ../.env.docker
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=prod
      - DEBUG=false
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j-prod:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - CACHE_BACKEND=redis
      - CACHE_REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - REDIS_URL=redis://:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379/0
      - SECURITY_JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - OBSERVABILITY_LOG_LEVEL=WARNING
      - OBSERVABILITY_LOG_FORMAT=json
      - SERVER_WORKERS=4
    depends_on:
      neo4j-prod:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    networks:
      - agentic-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  neo4j-prod:
    image: neo4j:5-community
    container_name: neo4j-prod
    env_file:
      - ../.env.docker
    ports:
      # HTTP browser disabled in prod - use Bolt only
      # Uncomment 7474 if you need Neo4j browser access
      # - "7474:7474"
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?NEO4J_PASSWORD is required}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_pagecache_size=2G
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j-data-prod:/data
      - neo4j-logs-prod:/logs
      - neo4j-import-prod:/import
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD}", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 2G
    networks:
      - agentic-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: redis-prod
    env_file:
      - ../.env.docker
    ports:
      - "6379:6379"
    command: >
      sh -c "redis-server --appendonly yes
      --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      --maxmemory 512mb --maxmemory-policy allkeys-lru"
    volumes:
      - redis-data-prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - agentic-network
    restart: always

  # Optional: Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: nginx-prod
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      agentic-brain:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    networks:
      - agentic-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - with-proxy

networks:
  agentic-network:
    driver: bridge

volumes:
  neo4j-data-prod:
  neo4j-logs-prod:
  neo4j-import-prod:
  redis-data-prod:
