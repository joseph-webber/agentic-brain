[project]
name = "agentic-brain"
version = "2.21.0"
description = "Enterprise-grade AI Agent Platform. Production-ready orchestration with GraphRAG, Multi-LLM support, and 155+ RAG loaders. Python, GPU-accelerated, Secure."
readme = "README.md"
requires-python = ">=3.11"
license = "Apache-2.0"
authors = [
    {name = "Joseph Webber", email = "joseph.webber@me.com"}
]
keywords = [
    "ai",
    "agents",
    "agentic",
    "llm",
    "rag",
    "graphrag",
    "knowledge-graph",
    "neo4j",
    "chatbot",
    "ai-framework",
    "ai-agents",
    "ai-platform",
    "ollama",
    "openai",
    "anthropic",
    "claude",
    "gpt",
    "embeddings",
    "vector-database",
    "semantic-search",
    "gpu-acceleration",
    "apple-silicon",
    "mlx",
    "cuda",
    "multi-tenant",
    "enterprise",
    "saas",
    "accessibility",
    "production-ready",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Healthcare Industry",
    "Intended Audience :: Information Technology",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Internet :: WWW/HTTP :: HTTP Servers",
    "Topic :: Database :: Database Engines/Servers",
    "Framework :: FastAPI",
    "Natural Language :: English",
    "Operating System :: OS Independent",
    "Typing :: Typed",
]

dependencies = [
    "aiohttp>=3.9.0,<4.0.0",  # Required for LLM API calls (Ollama, OpenRouter)
    "PyYAML>=6.0.0,<7.0.0",  # Centralized YAML configuration loading
    "questionary>=2.0.0,<3.0.0",  # Interactive CLI prompts (new-config wizard)
    "pyttsx3>=2.90",  # Cross-platform TTS (Windows/Linux)
    "gTTS>=2.5.0",    # Google TTS (free cloud fallback)
