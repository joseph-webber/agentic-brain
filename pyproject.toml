[project.scripts]
agentic-brain = "agentic_brain.cli:main"
agentic = "agentic_brain.cli:main"
ab = "agentic_brain.cli:main"

[project.urls]
Homepage = "https://github.com/joseph-webber/agentic-brain"
Repository = "https://github.com/joseph-webber/agentic-brain"
Documentation = "https://github.com/joseph-webber/agentic-brain/blob/main/docs/INDEX.md"

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentic_brain*"]

[tool.setuptools.package-data]
"agentic_brain.audio" = [
    "native/*.swift",
    "native/*.m",
    "native/*.cpp",
    "earcons/*.wav",
    "sounds/*.wav",
]

[tool.black]
line-length = 88
target-version = ["py311", "py312", "py313"]

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP", "B", "C4", "SIM"]
ignore = ["E501", "B008", "B904", "SIM102", "SIM105", "SIM113", "SIM117", "N802", "N801", "N813", "N815", "E741", "F401", "E402", "B017", "B024", "B027", "UP035", "UP045", "B028", "UP006", "UP042"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["N803", "N806", "F403", "F405", "B007", "B905", "F841"]

[tool.mypy]
python_version = "3.11"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
asyncio_mode = "auto"
asyncio_default_fixture_loop_scope = "function"
addopts = "-v --tb=short --strict-markers"
timeout = 60
markers = [
    "accessibility: Accessibility-focused tests for document processing",
    "unit: Unit tests (fast, no external deps)",
    "integration: Integration tests (may need services)",
    "e2e: End-to-end tests (full system)",
    "gpu: Tests that require GPU acceleration or hardware detection",
    "commerce: Commerce and storefront tests",
    "woocommerce: WooCommerce-specific tests",
    "wordpress: WordPress-specific tests",
    "slow: Slow tests (skip in CI by default)",
    "skip_ci: Skip in CI environment",
    "requires_redis: Requires Redis server to be running",
    "requires_neo4j: Requires Neo4j database to be running",
    "requires_temporal: Requires Temporal service to be running",
    "requires_docker: Requires Docker to be running",
    "requires_firebase: Requires Firebase emulator",
    "docker: Tests that require Docker",
    "asyncio: Async tests (provided by pytest-asyncio)",
]
filterwarnings = ["ignore::DeprecationWarning"]
