apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: agentic-brain-base

namespace: agentic-brain

commonLabels:
  app.kubernetes.io/name: agentic-brain
  app.kubernetes.io/managed-by: kustomize

resources:
  - deployment.yaml
  - service.yaml
  - configmap.yaml
  - secret.yaml
  - ingress.yaml
  - hpa.yaml

images:
  - name: ghcr.io/joseph-webber/agentic-brain
    newTag: latest

configMapGenerator: []

secretGenerator: []
