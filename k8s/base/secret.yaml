apiVersion: v1
kind: Secret
metadata:
  name: agentic-brain-secrets
  labels:
    app: agentic-brain
    app.kubernetes.io/name: agentic-brain
type: Opaque
stringData:
  # IMPORTANT: Replace these placeholder values before deploying!
  # Use: kubectl create secret generic agentic-brain-secrets --from-literal=...
  # Or use a secrets manager like Vault, AWS Secrets Manager, etc.
  
  # Neo4j Credentials
  NEO4J_PASSWORD: "CHANGE_ME_neo4j_password"
  
  # Redis Credentials (if using auth)
  REDIS_URL: "redis://redis:6379"
  REDIS_PASSWORD: ""
  
  # JWT Secret (generate with: openssl rand -hex 32)
  JWT_SECRET: "CHANGE_ME_jwt_secret_at_least_32_chars"
  
  # API Keys (comma-separated)
  API_KEYS: "CHANGE_ME_api_key_1,CHANGE_ME_api_key_2"
  
  # OpenAI/Anthropic API Keys (optional)
  OPENAI_API_KEY: ""
  ANTHROPIC_API_KEY: ""
