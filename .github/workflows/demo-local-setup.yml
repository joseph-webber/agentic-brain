name: Local Demo Setup (with API Keys)

on:
  workflow_dispatch:
    inputs:
      target_machine:
        description: 'SSH host for local demo (e.g., joe@macbook.local)'
        required: false
        default: 'localhost'
        type: string
      install_path:
        description: 'Installation path on target'
        required: false
        default: '~/agentic-brain-demo'
        type: string

permissions:
  contents: read

jobs:
  setup-local-demo:
    name: Deploy Demo with Full API Keys
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create API keys .env file
        run: |
          cat > .env.demo-keys << 'ENVFILE'
          # ═══════════════════════════════════════════════════════════════
          # AGENTIC BRAIN - DEMO API KEYS
          # Auto-generated by CI/CD from GitHub Secrets
          # ═══════════════════════════════════════════════════════════════
          
          # === LLM Providers (Smart Routing Cascade) ===
          # Priority 1: Groq (500 tok/s - ULTRA FAST)
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}
          
          # Priority 2: Local Ollama (always available, no key needed)
          # Just run: ollama serve
          
          # Priority 3: OpenAI (GPT-4, GPT-4o)
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          
          # Priority 4: Anthropic Claude (Claude 3.5, Claude 4)
          CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          ANTHROPIC_API_KEY=${{ secrets.CLAUDE_API_KEY }}
          
          # Priority 5: Google Gemini
          GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY=${{ secrets.GEMINI_API_KEY }}
          
          # Priority 6: xAI Grok
          XAI_API_KEY=${{ secrets.XAI_API_KEY }}
          GROK_API_KEY=${{ secrets.XAI_API_KEY }}
          
          # === Voice/TTS ===
          CARTESIA_API_KEY=${{ secrets.CARTESIA_API_KEY }}
          
          # === Infrastructure ===
          NEO4J_URI=bolt://localhost:7687
          NEO4J_USER=neo4j
          NEO4J_PASSWORD=Brain2026Demo
          
          REDIS_HOST=localhost
          REDIS_PORT=6379
          REDIS_PASSWORD=BrainRedis2026
          
          KAFKA_BOOTSTRAP_SERVERS=localhost:9092
          
          # === Smart Routing Config ===
          LLM_ROUTING_ENABLED=true
          LLM_ROUTING_DEFAULT=groq
          LLM_ROUTING_FALLBACK=ollama,openai,claude,gemini,grok
          LLM_CACHE_ENABLED=true
          LLM_CACHE_TTL=3600
          ENVFILE

      - name: Create demo setup script
        run: |
          cat > setup-demo-with-keys.sh << 'SCRIPT'
          #!/bin/bash
          set -euo pipefail
          
          echo "🧠 Agentic Brain - Full Demo Setup"
          echo "=================================="
          
          INSTALL_PATH="${1:-$HOME/agentic-brain-demo}"
          
          # Create directory
          mkdir -p "$INSTALL_PATH"
          cd "$INSTALL_PATH"
          
          # Copy env file
          if [ -f ".env.demo-keys" ]; then
            cp .env.demo-keys .env
            echo "✅ API keys installed to .env"
          fi
          
          # Start services
          echo "🐳 Starting Docker services..."
          docker compose up -d neo4j redis redpanda
          
          # Wait for services
          echo "⏳ Waiting for services..."
          sleep 10
          
          # Test keys
          echo "🔑 Testing API keys..."
          
          source .env
          
          # Test Groq
          if [ -n "${GROQ_API_KEY:-}" ]; then
            if curl -s https://api.groq.com/openai/v1/models -H "Authorization: Bearer $GROQ_API_KEY" | grep -q "llama"; then
              echo "  ✅ Groq: Working (500 tok/s)"
            else
              echo "  ❌ Groq: Failed"
            fi
          fi
          
          # Test OpenAI
          if [ -n "${OPENAI_API_KEY:-}" ]; then
            if curl -s https://api.openai.com/v1/models -H "Authorization: Bearer $OPENAI_API_KEY" | grep -q "gpt"; then
              echo "  ✅ OpenAI: Working"
            else
              echo "  ❌ OpenAI: Failed"
            fi
          fi
          
          echo ""
          echo "🚀 Demo ready at: $INSTALL_PATH"
          echo "   Run: source .env && python3 -m agentic_brain"
          SCRIPT
          chmod +x setup-demo-with-keys.sh

      - name: Package demo bundle
        run: |
          mkdir -p demo-bundle
          cp .env.demo-keys demo-bundle/
          cp setup-demo-with-keys.sh demo-bundle/
          cp -r src demo-bundle/ 2>/dev/null || true
          cp -r demo demo-bundle/ 2>/dev/null || true
          cp docker-compose.yml demo-bundle/ 2>/dev/null || true
          tar -czf demo-bundle.tar.gz demo-bundle/

      - name: Upload demo bundle (for download)
        uses: actions/upload-artifact@v4
        with:
          name: agentic-brain-demo-with-keys
          path: demo-bundle.tar.gz
          retention-days: 7

      - name: Deploy to local machine (if SSH available)
        if: inputs.target_machine != 'localhost'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEMO_SSH_KEY }}
        run: |
          # Setup SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/demo_key
          chmod 600 ~/.ssh/demo_key
          
          # Copy and run
          scp -i ~/.ssh/demo_key -o StrictHostKeyChecking=no \
            demo-bundle.tar.gz setup-demo-with-keys.sh .env.demo-keys \
            "${{ inputs.target_machine }}:${{ inputs.install_path }}/"
          
          ssh -i ~/.ssh/demo_key -o StrictHostKeyChecking=no \
            "${{ inputs.target_machine }}" \
            "cd ${{ inputs.install_path }} && ./setup-demo-with-keys.sh"

      - name: Summary
        run: |
          echo "## 🧠 Demo Bundle Ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### API Keys Included:" >> "$GITHUB_STEP_SUMMARY"
          echo "- ⚡ Groq (ultra-fast, 500 tok/s)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🤖 OpenAI (GPT-4)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🧠 Claude (Anthropic)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 💎 Gemini (Google)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🚀 Grok (xAI)" >> "$GITHUB_STEP_SUMMARY"
          echo "- 🎙️ Cartesia (TTS)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Download the artifact and run:" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "tar -xzf demo-bundle.tar.gz" >> "$GITHUB_STEP_SUMMARY"
          echo "cd demo-bundle && ./setup-demo-with-keys.sh" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
