name: Swarm Coordination Tests

on:
  push:
    paths:
      - 'src/agentic_brain/swarm/**'
      - 'tests/test_swarm*.py'
      - 'tests/test_redis*.py'
      - '.github/workflows/test-swarm.yml'
  pull_request:
    paths:
      - 'src/agentic_brain/swarm/**'
      - 'tests/test_swarm*.py'
      - 'tests/test_redis*.py'
      - '.github/workflows/test-swarm.yml'

jobs:
  test-swarm:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"
          pip install redis kafka-python

      - name: Run swarm tests
        env:
          REDIS_URL: redis://localhost:6379/0
          REDIS_HOST: localhost
          REDIS_PORT: "6379"
        run: |
          pytest tests/test_swarm*.py tests/test_redis*.py -v

      - name: Test coordination
        env:
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -c "
          import redis
          r = redis.from_url('redis://localhost:6379/0')
          r.set('test:ready', 'true')
          assert r.get('test:ready') == b'true'
          print('✅ Redis coordination working')
          "
