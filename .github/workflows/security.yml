name: Security Scan

on:
  push:
  pull_request:
  schedule:
    - cron: '27 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bandit:
    name: Bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install bandit[toml]
      - name: Run Bandit
        run: bandit -r src/agentic_brain -x tests -f txt || true

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,docs,graphrag]"
          pip install pip-audit
      - name: Audit dependencies
        run: pip-audit --progress-spinner off --format json --output pip-audit.json
      - name: Upload dependency audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit.json
          if-no-files-found: error

  trivy-filesystem:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
      - name: Upload Trivy filesystem SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  trivy-image:
    name: Trivy container scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - uses: actions/checkout@v4
      - name: Build local container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          load: true
          tags: agentic-brain:security-scan
      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: agentic-brain:security-scan
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

  security-role-tests:
    name: Security Role System Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"
      - name: Test ADMIN mode
        run: pytest tests/security/test_admin_mode.py -v --tb=short --color=yes
      - name: Test USER mode
        run: pytest tests/security/test_user_mode.py -v --tb=short --color=yes
      - name: Test GUEST mode
        run: pytest tests/security/test_guest_mode.py -v --tb=short --color=yes
      - name: Test bypass prevention
        run: pytest tests/security/test_bypass_prevention.py -v --tb=short --color=yes
      - name: Generate security coverage report
        run: |
          pip install pytest-cov
          pytest tests/security/ \
            --cov=src/agentic_brain/security \
            --cov-report=html \
            --cov-report=term \
            --cov-report=json \
            --cov-fail-under=40
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-coverage-${{ matrix.python-version }}
          path: |
            htmlcov/
            coverage.json
