name: ADL Quality Assurance

on:
  push:
    paths:
      - 'src/agentic_brain/adl/**'
      - 'tests/adl/**'
      - 'tests/test_adl*.py'
      - '.github/workflows/adl.yml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'src/agentic_brain/adl/**'
      - 'tests/adl/**'
      - 'tests/test_adl*.py'
      - '.github/workflows/adl.yml'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: ADL lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,test]"
      - name: Ruff
        run: ruff check src/agentic_brain/adl tests/adl tests/test_adl.py tests/test_adl_comprehensive_parser_only.py
      - name: MyPy
        run: mypy src/agentic_brain/adl --ignore-missing-imports

  parser:
    name: Parser regression (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"
      - name: Run parser suites
        run: |
          pytest \
            tests/adl/test_adl_parser.py \
            tests/test_adl_comprehensive_parser_only.py \
            -v --tb=short \
            --cov=agentic_brain.adl \
            --cov-report=xml
      - name: Upload parser coverage
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: adl-coverage-xml
          path: coverage.xml
          if-no-files-found: error

  generators:
    name: Generator & CLI tests
    runs-on: ubuntu-latest
    needs: parser
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"
      - name: Run generator and CLI tests
        run: |
          pytest \
            tests/test_adl.py \
            tests/adl/test_adl_cli.py \
            -v --tb=short
