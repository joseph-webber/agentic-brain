name: GraphRAG Quality Assurance

on:
  push:
    paths:
      - 'src/agentic_brain/rag/**'
      - 'src/agentic_brain/core/neo4j_pool.py'
      - 'tests/test_*rag*.py'
      - 'tests/test_neo4j*.py'
      - 'tests/test_core_neo4j_pool.py'
      - 'tests/test_rag_pipeline.py'
      - '.github/workflows/graphrag.yml'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'src/agentic_brain/rag/**'
      - 'src/agentic_brain/core/neo4j_pool.py'
      - 'tests/test_*rag*.py'
      - 'tests/test_neo4j*.py'
      - 'tests/test_core_neo4j_pool.py'
      - 'tests/test_rag_pipeline.py'
      - '.github/workflows/graphrag.yml'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEO4J_URI: bolt://localhost:7687
  NEO4J_USER: neo4j
  NEO4J_PASSWORD: testpassword
  REDIS_URL: redis://localhost:6379/0
  DEFAULT_LLM_PROVIDER: mock
  TESTING: 'true'

jobs:
  components:
    name: GraphRAG component tests
    runs-on: ubuntu-latest
    timeout-minutes: 35

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd="cypher-shell -u neo4j -p testpassword 'RETURN 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,graphrag,redis]"

      - name: Verify Neo4j connectivity with real database
        run: |
          python - <<'PY'
          import time
          from neo4j import GraphDatabase
          import redis

          deadline = time.time() + 180
          driver = None
          while time.time() < deadline:
              try:
                  driver = GraphDatabase.driver(
                      'bolt://localhost:7687', auth=('neo4j', 'testpassword')
                  )
                  driver.verify_connectivity()
                  with driver.session() as session:
                      session.run('CREATE (:SmokeTest {name: $name})', name='graphrag-ci').consume()
                      count = session.run('MATCH (n:SmokeTest) RETURN count(n) AS total').single()['total']
                      session.run('MATCH (n:SmokeTest) DETACH DELETE n').consume()
                      print(f'Neo4j smoke count: {count}')
                  redis.Redis(host='localhost', port=6379, db=0).ping()
                  print('Neo4j and Redis are ready')
                  break
              except Exception as exc:
                  print(f'Waiting for GraphRAG services: {exc}')
                  time.sleep(5)
              finally:
                  if driver is not None:
                      driver.close()
          else:
              raise SystemExit('GraphRAG services did not become ready in time')
          PY

      - name: Run GraphRAG test suite
        run: |
          pytest \
            tests/test_graphrag.py \
            tests/test_graph_rag.py \
            tests/test_rag_pipeline.py \
            tests/test_rag_ci.py \
            tests/test_neo4j_graph_rag.py \
            tests/test_neo4j_pool.py \
            tests/test_core_neo4j_pool.py \
            tests/test_neo4j_utils.py \
            tests/test_neo4j_schema.py \
            tests/test_neo4j_memory.py \
            tests/test_neo4j_workflow_state.py \
            -v --tb=short

  compatibility:
    name: GraphRAG compatibility smoke
    runs-on: ubuntu-latest
    needs: components
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,graphrag]"
      - name: Run GraphRAG compatibility tests
        run: pytest tests/ -k "graphrag or graph_rag or neo4j_pool" -v --tb=short
