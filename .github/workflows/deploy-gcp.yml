# Google Cloud Run Deployment Workflow
# JHipster-style cloud deployment
#
# Required secrets:
#   - GCP_PROJECT_ID
#   - GCP_SA_KEY (Service Account JSON key)
#   - GCP_REGION (e.g., us-central1)

name: Deploy to GCP

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment (staging or production)'
        required: true
        type: string

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION || 'us-central1' }}
  SERVICE_NAME: agentic-brain-${{ inputs.environment }}
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.build.outputs.image }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io

      - name: Build and push image
        id: build
        run: |
          IMAGE_URI="gcr.io/${{ env.GCP_PROJECT_ID }}/agentic-brain:${{ env.IMAGE_TAG }}"
          
          docker build \
            --build-arg ENVIRONMENT=${{ inputs.environment }} \
            -t "$IMAGE_URI" \
            -t "gcr.io/${{ env.GCP_PROJECT_ID }}/agentic-brain:latest" \
            .
          
          docker push "$IMAGE_URI"
          docker push "gcr.io/${{ env.GCP_PROJECT_ID }}/agentic-brain:latest"
          
          echo "image=$IMAGE_URI" >> $GITHUB_OUTPUT

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ needs.build-and-push.outputs.image }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --cpu 2 \
            --memory 2Gi \
            --min-instances 1 \
            --max-instances 10 \
            --concurrency 100 \
            --timeout 60 \
            --set-env-vars "ENVIRONMENT=${{ inputs.environment }},DEBUG=false,OBSERVABILITY_LOG_FORMAT=json"

      - name: Get service URL
        id: url
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          
          echo "🌐 Service URL: $URL"
          echo "url=$URL" >> $GITHUB_OUTPUT

  health-check:
    needs: deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Health check
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          
          for i in {1..5}; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: HTTP $RESPONSE, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed after 5 attempts"
          exit 1

  traffic-management:
    needs: [deploy, health-check]
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    
    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Gradual traffic migration
        run: |
          echo "Migrating traffic to new revision..."
          
          # Get latest revision
          LATEST=$(gcloud run revisions list \
            --service ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(name)' \
            --limit 1)
          
          # Route 100% traffic to latest (after health check passed)
          gcloud run services update-traffic ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --to-latest
          
          echo "✅ Traffic migrated to: $LATEST"
