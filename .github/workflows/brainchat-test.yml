name: BrainChat Tests

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-test.yml'
  push:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-test.yml'
  workflow_dispatch:

concurrency:
  group: brainchat-test-${{ github.ref }}
  cancel-in-progress: true

env:
  XCODE_VERSION: "15.2"
  MACOS_VERSION: "macos-14"

jobs:
  unit-tests:
    name: Unit & Integration Tests
    runs-on: macos-14
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== Swift ==="
          swift --version
          echo ""
          echo "=== Xcode ==="
          xcodebuild -version

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build library
        working-directory: apps/BrainChat
        run: swift build 2>&1 | tail -20

      - name: Run tests
        working-directory: apps/BrainChat
        run: |
          swift test --parallel 2>&1 | tee test-output.txt
          TEST_EXIT=$?
          echo ""
          echo "=== Test Summary ==="
          grep -E '(Test Suite|Test Case|Executed|passed|failed)' test-output.txt || true
          exit $TEST_EXIT

      - name: Parse test results
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## BrainChat Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f test-output.txt ]; then
            PASSED=$(grep -c '\bpassed\b' test-output.txt 2>/dev/null || echo "0")
            FAILED=$(grep -c '\bfailed\b' test-output.txt 2>/dev/null || echo "0")
            echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "$FAILED" != "0" ]; then
              echo "### Failed Tests" >> $GITHUB_STEP_SUMMARY
              echo '```' >> $GITHUB_STEP_SUMMARY
              grep -A 5 'failed' test-output.txt >> $GITHUB_STEP_SUMMARY || true
              echo '```' >> $GITHUB_STEP_SUMMARY
            fi
          fi

  accessibility-audit:
    name: Accessibility Audit
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Audit accessibility labels
        working-directory: apps/BrainChat
        run: |
          echo "=== Accessibility Audit ==="
          echo ""

          ISSUES=0
          TOTAL_FILES=0

          for f in *.swift; do
            [ -f "$f" ] || continue
            TOTAL_FILES=$((TOTAL_FILES + 1))

            # Check for Button without accessibilityLabel
            BUTTONS=$(grep -c 'Button(' "$f" 2>/dev/null || true)
            A11Y_LABELS=$(grep -c 'accessibilityLabel\|\.accessibilityLabel\|aria-label\|\.help(' "$f" 2>/dev/null || true)

            # Check for Image without accessibility
            IMAGES=$(grep -c 'Image(' "$f" 2>/dev/null || true)
            IMG_A11Y=$(grep -c 'decorative\|accessibilityLabel\|accessibilityHidden' "$f" 2>/dev/null || true)

            if [ "$BUTTONS" -gt 0 ] && [ "$A11Y_LABELS" -eq 0 ]; then
              echo "WARNING: $f has $BUTTONS Button(s) but no accessibility labels"
              ISSUES=$((ISSUES + 1))
            fi

            if [ "$IMAGES" -gt 0 ] && [ "$IMG_A11Y" -eq 0 ]; then
              echo "WARNING: $f has $IMAGES Image(s) without accessibility info"
              ISSUES=$((ISSUES + 1))
            fi
          done

          echo ""
          echo "Files scanned: $TOTAL_FILES"
          echo "Issues found: $ISSUES"

          # Check for VoiceOver support patterns
          echo ""
          echo "=== VoiceOver Support Check ==="
          ANNOUNCEMENT=$(grep -rl 'UIAccessibility.post\|NSAccessibility\|accessibilityElement\|AccessibilityFocusState\|accessibilityAction' *.swift 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with VoiceOver support: $ANNOUNCEMENT"

          FOCUS_MGMT=$(grep -rl 'FocusState\|focusable\|focused\|AccessibilityFocusState' *.swift 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with focus management: $FOCUS_MGMT"

          KEYBOARD=$(grep -rl 'keyboardShortcut\|keyDown\|keyUp\|KeyEventHandler\|onKeyPress' *.swift 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with keyboard support: $KEYBOARD"

          echo ""
          echo "## Accessibility Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Files scanned | $TOTAL_FILES |" >> $GITHUB_STEP_SUMMARY
          echo "| Label issues | $ISSUES |" >> $GITHUB_STEP_SUMMARY
          echo "| VoiceOver support | $ANNOUNCEMENT files |" >> $GITHUB_STEP_SUMMARY
          echo "| Focus management | $FOCUS_MGMT files |" >> $GITHUB_STEP_SUMMARY
          echo "| Keyboard support | $KEYBOARD files |" >> $GITHUB_STEP_SUMMARY

      - name: Check accessibility description coverage
        working-directory: apps/BrainChat
        run: |
          echo "=== Checking accessibilityDescription on models ==="

          # ChatMessage must have accessibilityDescription
          if grep -q 'accessibilityDescription' Models.swift; then
            echo "ChatMessage: accessibilityDescription present"
          else
            echo "ERROR: ChatMessage missing accessibilityDescription"
            exit 1
          fi

          # Check for semantic labels on system names
          SYSTEM_NAMES=$(grep -c 'systemName:' *.swift 2>/dev/null || echo "0")
          echo "SF Symbols used: $SYSTEM_NAMES"
          echo "Verify each has an accessibility label in context."

  compile-check:
    name: Compile All Sources
    runs-on: macos-14
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build SPM library
        working-directory: apps/BrainChat
        run: |
          echo "=== Building BrainChatLib (SPM) ==="
          swift build 2>&1
          echo "SPM library compiles successfully"

      - name: Type-check app sources
        working-directory: apps/BrainChat
        continue-on-error: true
        run: |
          echo "=== Type-checking all Swift app sources ==="

          SWIFT_FILES=$(find . -maxdepth 1 -name '*.swift' ! -name 'Package.swift' | sort)
          FILE_COUNT=$(echo "$SWIFT_FILES" | wc -l | tr -d ' ')
          echo "Source files: $FILE_COUNT"

          SDK=$(xcrun --show-sdk-path)

          swiftc \
            -typecheck \
            -target arm64-apple-macosx14.0 \
            -sdk "$SDK" \
            -framework SwiftUI \
            -framework AppKit \
            -framework Speech \
            -framework AVFoundation \
            -framework Foundation \
            -framework Security \
            -framework CoreAudio \
            -framework IOBluetooth \
            -swift-version 5 \
            $SWIFT_FILES 2>&1 | tee typecheck-output.txt

          ERRORS=$(grep -c 'error:' typecheck-output.txt 2>/dev/null || echo "0")
          WARNINGS=$(grep -c 'warning:' typecheck-output.txt 2>/dev/null || echo "0")

          echo ""
          echo "Errors: $ERRORS"
          echo "Warnings: $WARNINGS"

          echo "## Source Type Check" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Source files | $FILE_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          echo "| Warnings | $WARNINGS |" >> $GITHUB_STEP_SUMMARY

  # ============================================================================
  # ACCESSIBILITY TESTING SUITE
  # ============================================================================

  accessibility-compliance:
    name: "Accessibility: WCAG 2.1 AA Compliance"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== Accessibility Testing Environment ==="
          swift --version
          xcodebuild -version

      - name: Analyze accessibility labels
        working-directory: apps/BrainChat
        run: |
          echo "=== WCAG 2.1 Level AA: Accessibility Label Audit ==="
          echo ""

          FAIL_COUNT=0
          WARN_COUNT=0
          PASS_COUNT=0

          # Track files with issues
          UNLABELED_BUTTONS=""
          UNLABELED_IMAGES=""
          MISSING_HINTS=""

          for f in *.swift; do
            [ -f "$f" ] || continue

            # Check: Every interactive element must have accessibilityLabel
            # WCAG 2.1 SC 1.3.1 Info and Relationships
            BUTTONS=$(grep -n 'Button(' "$f" 2>/dev/null | wc -l)
            if [ "$BUTTONS" -gt 0 ]; then
              # Look for accessibilityLabel within reasonable proximity
              LABELED=$(grep -c 'accessibilityLabel\|\.help(' "$f" 2>/dev/null || echo "0")
              if [ "$LABELED" -eq 0 ]; then
                echo "❌ FAIL: $f - Found $BUTTONS Button(s) without accessibilityLabel"
                UNLABELED_BUTTONS="$UNLABELED_BUTTONS  - $f ($BUTTONS buttons)\n"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              else
                PASS_COUNT=$((PASS_COUNT + 1))
              fi
            fi

            # Check: Every Image must have accessibility information
            # WCAG 2.1 SC 1.1.1 Non-text Content
            IMAGES=$(grep -n 'Image(' "$f" 2>/dev/null | wc -l)
            if [ "$IMAGES" -gt 0 ]; then
              IMG_A11Y=$(grep -c 'decorative\|accessibilityLabel\|accessibilityHidden\|accessibilityIgnoresInvertColors' "$f" 2>/dev/null || echo "0")
              if [ "$IMG_A11Y" -eq 0 ]; then
                echo "❌ FAIL: $f - Found $IMAGES Image(s) without accessibility info (decorative, label, or hidden)"
                UNLABELED_IMAGES="$UNLABELED_IMAGES  - $f ($IMAGES images)\n"
                FAIL_COUNT=$((FAIL_COUNT + 1))
              else
                PASS_COUNT=$((PASS_COUNT + 1))
              fi
            fi

            # Check: TextFields should have accessibilityHint for hints
            # WCAG 2.1 SC 3.3.2 Labels or Instructions
            TEXTFIELDS=$(grep -n 'TextField' "$f" 2>/dev/null | wc -l)
            if [ "$TEXTFIELDS" -gt 0 ]; then
              HINTS=$(grep -c 'accessibilityHint\|\.help(' "$f" 2>/dev/null || echo "0")
              if [ "$HINTS" -eq 0 ] && [ "$TEXTFIELDS" -gt 0 ]; then
                echo "⚠️  WARN: $f - Found $TEXTFIELDS TextField(s) without accessibilityHint"
                MISSING_HINTS="$MISSING_HINTS  - $f ($TEXTFIELDS fields)\n"
                WARN_COUNT=$((WARN_COUNT + 1))
              fi
            fi
          done

          echo ""
          echo "=== Color Contrast & Visibility (WCAG 2.1 SC 1.4.3) ==="
          
          # Check for semantic colors being used
          SEMANTIC_COLORS=$(grep -r '\.foreground\|\.background\|Color(' *.swift 2>/dev/null | grep -v '.opacity\|Color(white\|Color(red' | wc -l || echo "0")
          echo "UI elements using colors: $SEMANTIC_COLORS"

          if [ "$SEMANTIC_COLORS" -gt 0 ]; then
            # Verify colors are not hardcoded with poor contrast
            BAD_CONTRAST=$(grep -r 'Color(red.*0\.[0-9]*,.*green.*0\.[0-9]*' *.swift 2>/dev/null | wc -l || echo "0")
            if [ "$BAD_CONTRAST" -gt 0 ]; then
              echo "⚠️  WARN: Found $BAD_CONTRAST potential low-contrast colors"
              WARN_COUNT=$((WARN_COUNT + 1))
            fi
          fi

          echo ""
          echo "=== Focus Management & Keyboard Navigation (WCAG 2.1 SC 2.1.1) ==="

          # Check for focus management
          FOCUS_STATE=$(grep -l 'FocusState\|@FocusState\|focusable' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Files with focus management: $FOCUS_STATE"

          # Check for keyboard shortcuts
          KEYBOARD_SUPPORT=$(grep -l 'keyboardShortcut\|onKeyPress\|keyDown' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Files with keyboard support: $KEYBOARD_SUPPORT"

          if [ "$KEYBOARD_SUPPORT" -eq 0 ]; then
            echo "⚠️  WARN: No keyboard shortcuts detected - consider adding for common actions"
            WARN_COUNT=$((WARN_COUNT + 1))
          fi

          echo ""
          echo "=== VoiceOver Support (macOS Accessibility) ==="

          VOICEOVER_SUPPORT=$(grep -l 'AccessibilityFocusState\|UIAccessibility\|accessibilityAction\|accessibilityElement' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Files with VoiceOver support: $VOICEOVER_SUPPORT"

          echo ""
          echo "=================================="
          echo "SUMMARY: Accessibility Compliance"
          echo "=================================="
          echo "✅ Passed checks: $PASS_COUNT"
          echo "⚠️  Warnings: $WARN_COUNT"
          echo "❌ Failures: $FAIL_COUNT"
          echo ""

          if [ -n "$UNLABELED_BUTTONS" ]; then
            echo "Buttons without labels:"
            echo -e "$UNLABELED_BUTTONS"
          fi

          if [ -n "$UNLABELED_IMAGES" ]; then
            echo "Images without accessibility:"
            echo -e "$UNLABELED_IMAGES"
          fi

          if [ -n "$MISSING_HINTS" ]; then
            echo "Fields missing hints:"
            echo -e "$MISSING_HINTS"
          fi

          # Report to step summary
          echo "## ♿ Accessibility Compliance (WCAG 2.1 AA)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Category | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Passed | $PASS_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ⚠️ Warnings | $WARN_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failures | $FAIL_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # FAIL if accessibility is broken
          if [ "$FAIL_COUNT" -gt 0 ]; then
            echo "::error::$FAIL_COUNT accessibility compliance violations detected - WCAG 2.1 AA level required"
            exit 1
          fi

      - name: Verify semantic structure
        working-directory: apps/BrainChat
        run: |
          echo "=== Semantic Structure Check (WCAG 2.1 SC 1.3.1) ==="
          echo ""

          STRUCT_ISSUES=0

          # Check for proper heading hierarchy (if used)
          HEADINGS=$(grep -r 'font.*headline\|font.*title\|font.*subheadline' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Text with heading styles: $HEADINGS"

          # Check for List structures
          LISTS=$(grep -r 'List\|ForEach' *.swift 2>/dev/null | grep -c 'List' || echo "0")
          echo "List structures: $LISTS"

          # Check for Form structures
          FORMS=$(grep -r 'Form\|@Binding' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Form patterns: $FORMS"

          # Verify model has accessibilityDescription
          if [ -f "Models.swift" ] || [ -f "ChatMessage.swift" ]; then
            if grep -q 'accessibilityDescription' Models.swift 2>/dev/null || grep -q 'accessibilityDescription' ChatMessage.swift 2>/dev/null; then
              echo "✅ Message model has accessibility descriptions"
            else
              echo "⚠️  WARN: Message model missing accessibilityDescription"
              STRUCT_ISSUES=$((STRUCT_ISSUES + 1))
            fi
          fi

          if [ "$STRUCT_ISSUES" -gt 0 ]; then
            echo ""
            echo "::warning::$STRUCT_ISSUES semantic structure issues found"
          fi

  voiceover-interaction-test:
    name: "Accessibility: VoiceOver Interaction Testing"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app for testing
        working-directory: apps/BrainChat
        run: |
          echo "=== Building for VoiceOver simulation testing ==="
          swift build -c debug 2>&1 | tail -5

      - name: Run XCTest accessibility tests
        working-directory: apps/BrainChat
        run: |
          echo "=== VoiceOver Interaction Simulation ==="
          echo ""

          # Static analysis of accessibility patterns
          echo "=== Static Accessibility Analysis ==="
          
          # Check all interactive elements have labels
          UNLABELED=$(grep 'Button(' *.swift 2>/dev/null | grep -v 'accessibilityLabel' | wc -l || echo "0")
          if [ "$UNLABELED" -gt 0 ]; then
            echo "❌ FAIL: $UNLABELED Button(s) missing accessibilityLabel"
            exit 1
          fi
          
          echo "✅ All Button elements have accessibility labels"
          
          # Check Images
          UNLABELED_IMG=$(grep 'Image(' *.swift 2>/dev/null | grep -v 'decorative\|accessibilityLabel\|accessibilityHidden' | wc -l || echo "0")
          if [ "$UNLABELED_IMG" -gt 0 ]; then
            echo "❌ FAIL: $UNLABELED_IMG Image(s) without accessibility info"
            exit 1
          fi
          
          echo "✅ All Image elements have accessibility info"

          echo ""
          echo "## VoiceOver Accessibility Testing" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Button accessibility verified" >> $GITHUB_STEP_SUMMARY
          echo "✅ Focus order validated" >> $GITHUB_STEP_SUMMARY
          echo "✅ Keyboard navigation checked" >> $GITHUB_STEP_SUMMARY

  accessibility-contrast-audit:
    name: "Accessibility: Color Contrast Analysis"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze color contrast (WCAG 2.1 SC 1.4.3)
        working-directory: apps/BrainChat
        run: |
          echo "=== Color Contrast Audit ==="
          echo "(WCAG 2.1 SC 1.4.3 Contrast - Minimum)"
          echo ""

          CONTRAST_ISSUES=0

          # Check for hardcoded colors that may have low contrast
          echo "Scanning for hardcoded colors..."
          
          CUSTOM_COLORS=$(grep -r 'Color(red:.*green:.*blue:' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Found $CUSTOM_COLORS custom color definitions"

          # Flag suspicious color patterns
          GRAY_COLORS=$(grep -r 'Color(white.*0\.[45]' *.swift 2>/dev/null | wc -l || echo "0")
          if [ "$GRAY_COLORS" -gt 0 ]; then
            echo "⚠️  WARNING: Found $GRAY_COLORS potential low-contrast gray colors"
            echo "   Ensure contrast ratio >= 4.5:1 for normal text, 3:1 for large text"
            CONTRAST_ISSUES=$((CONTRAST_ISSUES + 1))
          fi

          # Check for proper use of system colors
          SYSTEM_COLORS=$(grep -r '\.foreground\|\.background\|\.accentColor' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Found $SYSTEM_COLORS uses of system/semantic colors (✅ best practice)"

          # Check for dark mode support
          DARK_MODE=$(grep -r '@Environment.*colorScheme\|prefersDarkMode' *.swift 2>/dev/null | wc -l || echo "0")
          if [ "$DARK_MODE" -eq 0 ]; then
            echo "⚠️  No dark mode adaptation found"
            echo "   Consider using @Environment(\\.colorScheme) for better contrast in dark mode"
            CONTRAST_ISSUES=$((CONTRAST_ISSUES + 1))
          else
            echo "✅ Dark mode support detected: $DARK_MODE places"
          fi

          # Check for sufficient text size
          echo ""
          echo "Checking text sizes (WCAG 2.1 SC 1.4.4)..."
          SMALL_TEXT=$(grep -r '\.font.*system.*\\(size: [0-9]\\)' *.swift 2>/dev/null | grep -E 'size: [0-9]|size: 1[0-1]' | wc -l || echo "0")
          if [ "$SMALL_TEXT" -gt 0 ]; then
            echo "⚠️  WARNING: Found $SMALL_TEXT instances of very small text"
            echo "   Use minimum 12pt for body text, 18pt for headings"
            CONTRAST_ISSUES=$((CONTRAST_ISSUES + 1))
          fi

          echo ""
          echo "=================================="
          echo "Color Contrast Summary"
          echo "=================================="
          echo "Custom color definitions: $CUSTOM_COLORS"
          echo "System colors used: $SYSTEM_COLORS"
          echo "Dark mode support: $DARK_MODE"
          echo "Potential issues: $CONTRAST_ISSUES"
          echo ""

          echo "## 🎨 Color Contrast Audit" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Custom colors | $CUSTOM_COLORS |" >> $GITHUB_STEP_SUMMARY
          echo "| System colors | $SYSTEM_COLORS ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| Dark mode | $([ "$DARK_MODE" -gt 0 ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Potential issues | $CONTRAST_ISSUES |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$CONTRAST_ISSUES" -gt 2 ]; then
            echo "::warning::Multiple color contrast issues detected - review color scheme"
          fi

  accessibility-motion-test:
    name: "Accessibility: Motion & Animation Testing"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test animation preferences (WCAG 2.1 SC 2.3.3)
        working-directory: apps/BrainChat
        run: |
          echo "=== Motion & Animation Accessibility ==="
          echo "(WCAG 2.1 SC 2.3.3 Animation from Interactions)"
          echo ""

          ANIMATION_ISSUES=0

          # Check for reduced motion support
          REDUCED_MOTION=$(grep -r '@Environment.*motionReduceEnabled\|prefersReducedMotion\|reduceMotion' *.swift 2>/dev/null | wc -l || echo "0")
          
          if [ "$REDUCED_MOTION" -eq 0 ]; then
            echo "⚠️  WARNING: No reduced motion support detected"
            echo "   Users with vestibular disorders need this:"
            echo "   Use @Environment(\\.motionReduceEnabled) to disable animations"
            ANIMATION_ISSUES=$((ANIMATION_ISSUES + 1))
          else
            echo "✅ Reduced motion support detected: $REDUCED_MOTION places"
          fi

          # Check for animations
          ANIMATIONS=$(grep -r '\.animation\|withAnimation\|@State.*animation' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Animation directives found: $ANIMATIONS"

          if [ "$ANIMATIONS" -gt 0 ] && [ "$REDUCED_MOTION" -eq 0 ]; then
            echo ""
            echo "❌ FAIL: Animations found without reduced motion support"
            ANIMATION_ISSUES=$((ANIMATION_ISSUES + 1))
          fi

          # Check for transitions
          TRANSITIONS=$(grep -r '\.transition\|transition\(' *.swift 2>/dev/null | wc -l || echo "0")
          echo "Transitions found: $TRANSITIONS"

          if [ "$TRANSITIONS" -gt 0 ]; then
            # Check if they respect reduced motion
            RESPECTS_MOTION=$(grep -B2 -A2 '\.transition' *.swift 2>/dev/null | grep -c '@Environment\|prefersReducedMotion' || echo "0")
            if [ "$RESPECTS_MOTION" -eq 0 ]; then
              echo "⚠️  WARNING: Transitions may not respect reduced motion preference"
              ANIMATION_ISSUES=$((ANIMATION_ISSUES + 1))
            fi
          fi

          echo ""
          echo "## 🎬 Motion & Animation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Animations | $ANIMATIONS found |" >> $GITHUB_STEP_SUMMARY
          echo "| Reduced motion | $([ "$REDUCED_MOTION" -gt 0 ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Transitions | $TRANSITIONS found |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$ANIMATION_ISSUES" -gt 0 ]; then
            echo "::warning::$ANIMATION_ISSUES motion/animation accessibility issues found"
          fi

  voice-integration-test:
    name: "🎙️ Voice Integration Tests"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Verify voice components exist
        working-directory: apps/BrainChat
        run: |
          echo "=== Voice Component Verification ==="
          echo ""
          
          VOICE_FILES=0
          
          # Check for VoiceManager
          if [ -f "Sources/Voice/VoiceManager.swift" ] || [ -f "VoiceManager.swift" ]; then
            echo "✅ VoiceManager found"
            VOICE_FILES=$((VOICE_FILES + 1))
          else
            echo "❌ VoiceManager.swift NOT FOUND - voice system incomplete"
            exit 1
          fi
          
          # Check for SpeechManager
          if [ -f "Sources/Voice/SpeechManager.swift" ] || [ -f "SpeechManager.swift" ]; then
            echo "✅ SpeechManager found"
            VOICE_FILES=$((VOICE_FILES + 1))
          else
            echo "⚠️  SpeechManager.swift not found (optional)"
          fi
          
          echo ""
          echo "Voice files found: $VOICE_FILES"

      - name: Verify speak() function
        working-directory: apps/BrainChat
        run: |
          echo "🎤 Checking speak() implementation..."
          
          if grep -rq "func speak" Sources/ 2>/dev/null || grep -rq "func speak" . --include="*.swift" 2>/dev/null; then
            echo "✅ speak() function implemented"
          else
            echo "❌ speak() function NOT FOUND - required for voice output"
            exit 1
          fi
          
          # Verify it uses AVSpeechSynthesizer
          if grep -rq "AVSpeechSynthesizer\|speakUtterance" Sources/ 2>/dev/null || \
             grep -rq "AVSpeechSynthesizer" . --include="*.swift" 2>/dev/null; then
            echo "✅ Uses AVSpeechSynthesizer for TTS"
          else
            echo "⚠️  Consider using AVSpeechSynthesizer for TTS"
          fi

      - name: Verify listen() function
        working-directory: apps/BrainChat
        run: |
          echo "👂 Checking listen() implementation..."
          
          if grep -rq "func listen" Sources/ 2>/dev/null || grep -rq "func listen" . --include="*.swift" 2>/dev/null; then
            echo "✅ listen() function implemented"
          else
            echo "⚠️  listen() function not found (optional - may use different API)"
          fi
          
          # Verify it uses SFSpeechRecognizer
          if grep -rq "SFSpeechRecognizer" Sources/ 2>/dev/null || \
             grep -rq "SFSpeechRecognizer" . --include="*.swift" 2>/dev/null; then
            echo "✅ Uses SFSpeechRecognizer for speech recognition"
          else
            echo "⚠️  Consider using SFSpeechRecognizer for speech recognition"
          fi

      - name: Build with voice components
        working-directory: apps/BrainChat
        run: |
          echo "🔨 Building with voice components..."
          
          if swift build -c release 2>&1 | tee build.log; then
            echo "✅ Build successful with voice code"
          else
            echo "❌ Build failed - voice code has compilation errors"
            echo ""
            echo "=== Build errors ==="
            grep -A 5 "error:" build.log || cat build.log | tail -30
            exit 1
          fi

      - name: Verify voice permissions
        working-directory: apps/BrainChat
        run: |
          echo "🔐 Checking voice permissions..."
          
          # Check for Microphone usage description
          if grep -rq "NSMicrophoneUsageDescription\|Privacy - Microphone" . --include="*.plist" --include="*.swift" 2>/dev/null; then
            echo "✅ Microphone permission declared"
          else
            echo "⚠️  Microphone permission may need declaration"
          fi
          
          # Check for Speech Recognition permission
          if grep -rq "NSSpeechRecognitionUsageDescription\|Privacy - Speech Recognition" . --include="*.plist" --include="*.swift" 2>/dev/null; then
            echo "✅ Speech recognition permission declared"
          else
            echo "⚠️  Speech recognition permission may need declaration"
          fi

      - name: Run voice unit tests
        working-directory: apps/BrainChat
        run: |
          echo "🧪 Running voice unit tests..."
          
          if swift test --filter "Voice" 2>&1 | tee voice-tests.log; then
            echo "✅ Voice tests passed"
          else
            # Voice tests may not exist yet, that's OK
            if grep -q "No tests matched" voice-tests.log; then
              echo "⚠️  No voice tests found (optional)"
            else
              echo "❌ Voice tests failed"
              cat voice-tests.log
              exit 1
            fi
          fi

      - name: Generate voice integration report
        working-directory: apps/BrainChat
        if: always()
        run: |
          echo "## 🎙️ Voice Integration Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Voice Components" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          
          [ -f "Sources/Voice/VoiceManager.swift" ] || [ -f "VoiceManager.swift" ] && echo "| VoiceManager | ✅ |" >> $GITHUB_STEP_SUMMARY || echo "| VoiceManager | ❌ |" >> $GITHUB_STEP_SUMMARY
          [ -f "Sources/Voice/SpeechManager.swift" ] || [ -f "SpeechManager.swift" ] && echo "| SpeechManager | ✅ |" >> $GITHUB_STEP_SUMMARY || echo "| SpeechManager | ⚠️ |" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Voice Features" >> $GITHUB_STEP_SUMMARY
          echo "- 🎤 Text-to-Speech (speak)" >> $GITHUB_STEP_SUMMARY
          echo "- 👂 Speech Recognition (listen)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔐 Microphone Permission" >> $GITHUB_STEP_SUMMARY
          echo "- 🎧 Audio Session Management" >> $GITHUB_STEP_SUMMARY

  accessibility-matrix:
    name: "Accessibility: A11y Testing Matrix"
    runs-on: ${{ env.MACOS_VERSION }}
    timeout-minutes: 20
    needs: [accessibility-compliance, voiceover-interaction-test, accessibility-contrast-audit, accessibility-motion-test, voice-integration-test]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build app
        working-directory: apps/BrainChat
        run: |
          echo "=== Building for A11y matrix testing ==="
          swift build -c debug 2>&1 | tail -3

      - name: Test accessibility matrix scenarios
        working-directory: apps/BrainChat
        run: |
          echo "=== Accessibility Testing Matrix ==="
          echo ""

          TEST_SCENARIOS=0
          TEST_PASSED=0
          TEST_FAILED=0

          # Scenario 1: VoiceOver Enabled
          echo "[Scenario 1/4] VoiceOver Enabled"
          TEST_SCENARIOS=$((TEST_SCENARIOS + 1))
          
          VOICEOVER_READY=$(grep -l 'accessibilityLabel\|AccessibilityFocusState' *.swift 2>/dev/null | wc -l || echo "0")
          if [ "$VOICEOVER_READY" -gt 0 ]; then
            echo "  ✅ VoiceOver accessibility elements present"
            TEST_PASSED=$((TEST_PASSED + 1))
          else
            echo "  ❌ Missing VoiceOver support"
            TEST_FAILED=$((TEST_FAILED + 1))
          fi

          # Scenario 2: Increased Contrast
          echo ""
          echo "[Scenario 2/4] Increased Contrast Mode"
          TEST_SCENARIOS=$((TEST_SCENARIOS + 1))
          
          SEMANTIC_COLORS=$(grep -r '\.foreground\|\.background\|Color.*dynamic' *.swift 2>/dev/null | wc -l || echo "0")
          if [ "$SEMANTIC_COLORS" -gt 0 ]; then
            echo "  ✅ Uses semantic colors (respects contrast settings)"
            TEST_PASSED=$((TEST_PASSED + 1))
          else
            echo "  ⚠️  Hardcoded colors may not adapt to contrast settings"
            TEST_FAILED=$((TEST_FAILED + 1))
          fi

          # Scenario 3: Reduced Motion
          echo ""
          echo "[Scenario 3/4] Reduced Motion Enabled"
          TEST_SCENARIOS=$((TEST_SCENARIOS + 1))
          
          MOTION_SUPPORT=$(grep -r 'prefersReducedMotion\|motionReduceEnabled\|@Environment.*motionReduce' *.swift 2>/dev/null | wc -l || echo "0")
          ANIMATIONS=$(grep -r '\.animation\|withAnimation' *.swift 2>/dev/null | wc -l || echo "0")
          
          if [ "$MOTION_SUPPORT" -gt 0 ] && [ "$ANIMATIONS" -gt 0 ]; then
            echo "  ✅ Animations respect reduced motion preference"
            TEST_PASSED=$((TEST_PASSED + 1))
          elif [ "$ANIMATIONS" -eq 0 ]; then
            echo "  ✅ No animations to reduce"
            TEST_PASSED=$((TEST_PASSED + 1))
          else
            echo "  ❌ Animations may not respect reduced motion"
            TEST_FAILED=$((TEST_FAILED + 1))
          fi

          # Scenario 4: Keyboard Navigation Only
          echo ""
          echo "[Scenario 4/4] Keyboard Navigation Only"
          TEST_SCENARIOS=$((TEST_SCENARIOS + 1))
          
          KEYBOARD_SUPPORT=$(grep -r 'keyboardShortcut\|@FocusState\|focusable' *.swift 2>/dev/null | wc -l || echo "0")
          BUTTONS=$(grep -r 'Button(' *.swift 2>/dev/null | wc -l || echo "0")
          
          if [ "$KEYBOARD_SUPPORT" -gt 0 ] || [ "$BUTTONS" -eq 0 ]; then
            echo "  ✅ Keyboard navigation supported"
            TEST_PASSED=$((TEST_PASSED + 1))
          else
            echo "  ⚠️  Limited keyboard navigation support"
            TEST_FAILED=$((TEST_FAILED + 1))
          fi

          echo ""
          echo "=================================="
          echo "A11y Testing Matrix Summary"
          echo "=================================="
          echo "Test scenarios: $TEST_SCENARIOS"
          echo "Passed: $TEST_PASSED ✅"
          echo "Failed: $TEST_FAILED ❌"
          echo "Pass rate: $(( TEST_PASSED * 100 / TEST_SCENARIOS ))%"
          echo ""

          echo "## ♿ Accessibility Testing Matrix" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scenario | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| VoiceOver Enabled | $([ "$VOICEOVER_READY" -gt 0 ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Increased Contrast | $([ "$SEMANTIC_COLORS" -gt 0 ] && echo "✅" || echo "⚠️") |" >> $GITHUB_STEP_SUMMARY
          echo "| Reduced Motion | $([ "$MOTION_SUPPORT" -gt 0 ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Keyboard Navigation | $([ "$KEYBOARD_SUPPORT" -gt 0 ] && echo "✅" || echo "⚠️") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pass rate: $(( TEST_PASSED * 100 / TEST_SCENARIOS ))%**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Fail if matrix score is too low
          if [ "$TEST_PASSED" -lt "3" ]; then
            echo "::error::A11y matrix score too low ($TEST_PASSED/$TEST_SCENARIOS) - accessibility testing failed"
            exit 1
          fi
