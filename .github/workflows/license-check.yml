name: License Check
on: [push, pull_request]
jobs:
  license:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check for GPL licenses
        run: |
          if grep -r "GPL-3.0\|LGPL\|AGPL" src/ --include="*.py"; then
            echo "ERROR: Found non-Apache licenses!"
            exit 1
          fi
      - name: Verify Apache 2.0 headers
        run: |
          python scripts/check_license_headers.py
