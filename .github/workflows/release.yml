name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v2.12.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  DEMO_API_IMAGE: ${{ github.repository }}/demo-api

jobs:
  build_and_publish:
    runs-on: ubuntu-latest
    environment: release
    outputs:
      release_tag: ${{ steps.release-meta.outputs.tag_version }}
      package_version: ${{ steps.release-meta.outputs.package_version }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine

      - name: Verify version matches tag
        id: release-meta
        run: |
          # Handle both tag push and workflow_dispatch
          if [ -n "${{ inputs.tag }}" ]; then
            TAG_VERSION="${{ inputs.tag }}"
          else
            TAG_VERSION="${{ github.ref_name }}"
          fi
          PACKAGE_VERSION=$(python -c "import re; content=open('pyproject.toml').read(); m=re.search(r'version = \"([^\"]+)\"', content); print(m.group(1) if m else '')")
          
          echo "Tag version: $TAG_VERSION"
          echo "Package version: v$PACKAGE_VERSION"
          echo "tag_version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          
          if [ "v$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: Tag version ($TAG_VERSION) does not match package version (v$PACKAGE_VERSION)"
            exit 1
          fi
          echo "✓ Version match verified!"

      - name: Build distribution packages
        run: python -m build --outdir dist

      - name: Verify package contents
        run: |
          echo "Distribution packages:"
          ls -lh dist/
          echo ""
          echo "Checking package integrity..."
          twine check dist/*

      - name: Publish to PyPI
        if: secrets.PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          twine upload dist/* --non-interactive --skip-existing
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release-meta.outputs.tag_version }}
          name: ${{ steps.release-meta.outputs.tag_version }}
          draft: false
          prerelease: ${{ contains(steps.release-meta.outputs.tag_version, 'rc') || contains(steps.release-meta.outputs.tag_version, 'alpha') || contains(steps.release-meta.outputs.tag_version, 'beta') }}
          files: dist/*
          body: |
            ## Changes in ${{ steps.release-meta.outputs.tag_version }}
            
            For a detailed changelog, see the [commit history](https://github.com/${{ github.repository }}/commits/${{ steps.release-meta.outputs.tag_version }}).
            
            ### Installation
            ```bash
            pip install agentic-brain==${{ steps.release-meta.outputs.package_version }}
            ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-demo:
    name: Deploy Demo Package
    runs-on: ubuntu-latest
    needs: build_and_publish

    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract demo image metadata
        id: demo-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DEMO_API_IMAGE }}
          tags: |
            type=raw,value=${{ needs.build_and_publish.outputs.release_tag }}
            type=raw,value=${{ needs.build_and_publish.outputs.package_version }}
            type=raw,value=latest

      - name: Build and push demo API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: demo/Dockerfile.api
          push: true
          tags: ${{ steps.demo-meta.outputs.tags }}
          labels: ${{ steps.demo-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            AGENTIC_BRAIN_VERSION=${{ needs.build_and_publish.outputs.package_version }}

      - name: Create demo package artifact
        env:
          RELEASE_TAG: ${{ needs.build_and_publish.outputs.release_tag }}
          PACKAGE_VERSION: ${{ needs.build_and_publish.outputs.package_version }}
          DEMO_API_IMAGE_REF: ${{ env.REGISTRY }}/${{ env.DEMO_API_IMAGE }}:${{ needs.build_and_publish.outputs.release_tag }}
        run: |
          set -euo pipefail
          PACKAGE_ROOT="dist-demo/agentic-brain-demo-${RELEASE_TAG}"

          rm -rf dist-demo
          mkdir -p "${PACKAGE_ROOT}/demo" "${PACKAGE_ROOT}/plugins" "${PACKAGE_ROOT}/sample-data"

          cp demo/docker-compose.demo.yml demo/Dockerfile.api demo/Dockerfile.wordpress demo/setup-demo.sh "${PACKAGE_ROOT}/demo/"
          cp -R demo/sample-data/. "${PACKAGE_ROOT}/sample-data/"
          cp -R plugins/wordpress/agentic-brain "${PACKAGE_ROOT}/plugins/agentic-brain"

          (
            cd "${PACKAGE_ROOT}/plugins"
            zip -qr agentic-brain.zip agentic-brain
          )

          cat > "${PACKAGE_ROOT}/demo/.env.demo" <<EOF
          DEMO_API_IMAGE=${DEMO_API_IMAGE_REF}
          DEMO_WORDPRESS_IMAGE=agentic-brain-demo-wordpress:${RELEASE_TAG}
          DEMO_WP_PORT=8080
          DEMO_API_PORT=8000
          DEMO_NEO4J_HTTP_PORT=7475
          DEMO_NEO4J_BOLT_PORT=7688
          DEMO_REDIS_PORT=6380
          EOF

          cat > "${PACKAGE_ROOT}/demo/manifest.json" <<EOF
          {
            "release": "${RELEASE_TAG}",
            "package_version": "${PACKAGE_VERSION}",
            "api_image": "${DEMO_API_IMAGE_REF}",
            "wordpress_build_context": "demo/Dockerfile.wordpress"
          }
          EOF

          chmod +x "${PACKAGE_ROOT}/demo/setup-demo.sh"
          tar -czf "dist-demo/agentic-brain-demo-${RELEASE_TAG}.tar.gz" -C dist-demo "agentic-brain-demo-${RELEASE_TAG}"

      - name: Upload demo workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-package-${{ needs.build_and_publish.outputs.release_tag }}
          path: dist-demo/agentic-brain-demo-${{ needs.build_and_publish.outputs.release_tag }}.tar.gz

      - name: Attach demo package to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.build_and_publish.outputs.release_tag }}" \
            "dist-demo/agentic-brain-demo-${{ needs.build_and_publish.outputs.release_tag }}.tar.gz" \
            --clobber

      - name: Summarize demo deployment
        run: |
          echo "## 🎯 Demo deployment ready" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- API image: \`${{ env.REGISTRY }}/${{ env.DEMO_API_IMAGE }}:${{ needs.build_and_publish.outputs.release_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Demo package: \`agentic-brain-demo-${{ needs.build_and_publish.outputs.release_tag }}.tar.gz\`" >> "$GITHUB_STEP_SUMMARY"
