name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      version:
        description: SemVer tag to release (for example v3.2.0)
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate semantic release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      release_notes: ${{ steps.notes.outputs.release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Validate SemVer tag and package version
        id: meta
        run: |
          python - <<'PY'
          import os
          import re
          import tomllib
          from pathlib import Path

          requested = os.environ.get('INPUT_VERSION') or os.environ.get('GITHUB_REF_NAME', '')
          if not requested:
              raise SystemExit('No release tag/version supplied')
          if not re.fullmatch(r'v\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?', requested):
              raise SystemExit(f'Invalid semantic version tag: {requested}')

          version = requested[1:].split('+', 1)[0]
          package_version = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))['project']['version']
          if version.split('-', 1)[0] != package_version:
              raise SystemExit(
                  f'Tag version {requested} does not match pyproject.toml version {package_version}'
              )

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f'tag={requested}\n')
              fh.write(f'version={version}\n')
          print(f'SemVer validated for {requested}')
          PY
        env:
          INPUT_VERSION: ${{ inputs.version }}

      - name: Generate changelog-driven release notes
        id: notes
        run: |
          python - <<'PY'
          import os
          import re
          from pathlib import Path

          version = os.environ['VERSION']
          changelog = Path('CHANGELOG.md').read_text(encoding='utf-8')
          pattern = re.compile(
              rf'^## \[{re.escape(version)}\].*?(?=^## \[|\Z)',
              re.MULTILINE | re.DOTALL,
          )
          match = pattern.search(changelog)
          notes = match.group(0).strip() if match else f'Automated release for {version}.'
          with open('release-notes.md', 'w', encoding='utf-8') as fh:
              fh.write(notes + '\n')
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write('release_notes<<EOF\n')
              fh.write(notes + '\n')
              fh.write('EOF\n')
          print(notes)
          PY
        env:
          VERSION: ${{ steps.meta.outputs.version }}

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  qa:
    name: Release smoke tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,docs,graphrag,llm]"
      - name: Run release smoke suite
        run: |
          pytest \
            tests/test_adl.py \
            tests/test_graphrag.py \
            tests/test_readme_features.py \
            tests/test_temporal_compat.py \
            -v --tb=short

  build:
    name: Build release artifacts
    runs-on: ubuntu-latest
    needs: [validate, qa]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Build package
        run: |
          python -m pip install --upgrade pip setuptools wheel build twine
          python -m build
          twine check dist/*
      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/*
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - name: Publish package
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  docker:
    name: Publish container image
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.validate.outputs.tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.validate.outputs.tag }}
            type=raw,value=latest,enable=${{ !contains(needs.validate.outputs.tag, '-') }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  github-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: [validate, build, publish-pypi, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          name: Agentic Brain ${{ needs.validate.outputs.tag }}
          body_path: release-notes.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(needs.validate.outputs.tag, '-') }}
