# ============================================================================
# BrainChat Master CI/CD - The Gatekeeper
# ============================================================================
# Nothing merges to main without passing ALL jobs.
# This protects Joseph from broken code. Every job must be green.
# ============================================================================

name: BrainChat Master CI/CD

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-master.yml'
  push:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-master.yml'
  workflow_dispatch:

concurrency:
  group: brainchat-master-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: "Brain Chat"
  BUNDLE_ID: "com.josephwebber.brainchat"
  MACOS_MIN: "14.0"
  SWIFT_MIN_VERSION: "5.9"
  COVERAGE_THRESHOLD: 90

permissions:
  contents: read
  pull-requests: write
  checks: write

# ============================================================================
# JOBS
# ============================================================================

jobs:

  # ==========================================================================
  # 1. BUILD - Compile Swift app and create .app bundle
  # ==========================================================================
  build:
    name: "1. Build Swift App"
    runs-on: macos-14
    timeout-minutes: 30

    outputs:
      swift-version: ${{ steps.swift-check.outputs.swift_version }}
      binary-size: ${{ steps.verify.outputs.binary_size }}
      bundle-size: ${{ steps.verify.outputs.bundle_size }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify Swift ${{ env.SWIFT_MIN_VERSION }}+
        id: swift-check
        run: |
          echo "=== Environment ==="
          sw_vers
          swift --version
          xcodebuild -version

          SWIFT_VERSION=$(swift --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          MAJOR=$(echo "$SWIFT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$SWIFT_VERSION" | cut -d. -f2)

          if [ "$MAJOR" -lt 5 ] || ([ "$MAJOR" -eq 5 ] && [ "$MINOR" -lt 9 ]); then
            echo "::error::Swift ${{ env.SWIFT_MIN_VERSION }}+ required, found $SWIFT_VERSION"
            exit 1
          fi

          echo "swift_version=$SWIFT_VERSION" >> "$GITHUB_OUTPUT"
          echo "Swift $SWIFT_VERSION OK"

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build app
        working-directory: apps/BrainChat
        run: |
          chmod +x build.sh
          ./build.sh --clean

      - name: Verify build output
        id: verify
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"
          BINARY="$APP_PATH/Contents/MacOS/BrainChat"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App bundle not found at: $APP_PATH"
            exit 1
          fi

          if [ ! -f "$BINARY" ]; then
            echo "::error::Binary not found at: $BINARY"
            exit 1
          fi

          file "$BINARY"
          BINARY_SIZE=$(du -sh "$BINARY" | cut -f1)
          BUNDLE_SIZE=$(du -sh "$APP_PATH" | cut -f1)

          echo "binary_size=$BINARY_SIZE" >> "$GITHUB_OUTPUT"
          echo "bundle_size=$BUNDLE_SIZE" >> "$GITHUB_OUTPUT"

          echo "Binary: $BINARY_SIZE | Bundle: $BUNDLE_SIZE"

      - name: Cache build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: brainchat-build
          path: |
            apps/BrainChat/build/Brain Chat.app
            apps/BrainChat/.build/
          retention-days: 1

      - name: Build summary
        if: always()
        run: |
          echo "## 1. Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Swift | ${{ steps.swift-check.outputs.swift_version }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Binary | ${{ steps.verify.outputs.binary_size }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Bundle | ${{ steps.verify.outputs.bundle_size }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Platform | macOS ${{ env.MACOS_MIN }}+ arm64 |" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # 2. UNIT TESTS - Run all unit tests, enforce 90%+ coverage
  # ==========================================================================
  unit-tests:
    name: "2. Unit Tests (90%+ coverage)"
    runs-on: macos-14
    needs: build
    timeout-minutes: 20

    outputs:
      tests-passed: ${{ steps.results.outputs.passed }}
      tests-failed: ${{ steps.results.outputs.failed }}
      coverage-pct: ${{ steps.coverage.outputs.coverage_pct }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build for testing
        working-directory: apps/BrainChat
        run: swift build --build-tests 2>&1 | tail -20

      - name: Run unit tests
        id: run-tests
        working-directory: apps/BrainChat
        run: |
          swift test --parallel --enable-code-coverage 2>&1 | tee test-output.txt
          echo "test_exit=$?" >> "$GITHUB_OUTPUT"

      - name: Parse test results
        id: results
        if: always()
        working-directory: apps/BrainChat
        run: |
          PASSED=0
          FAILED=0

          if [ -f test-output.txt ]; then
            # Extract passed/failed from XCTest output
            PASSED=$(grep -cE "Test Case.*passed" test-output.txt 2>/dev/null || echo "0")
            FAILED=$(grep -cE "Test Case.*failed" test-output.txt 2>/dev/null || echo "0")

            # Fallback: parse "Executed N tests" line
            if [ "$PASSED" -eq 0 ] && [ "$FAILED" -eq 0 ]; then
              EXECUTED_LINE=$(grep -oE "Executed [0-9]+ tests?, with [0-9]+ failures?" test-output.txt | tail -1)
              if [ -n "$EXECUTED_LINE" ]; then
                TOTAL=$(echo "$EXECUTED_LINE" | grep -oE "Executed [0-9]+" | grep -oE "[0-9]+")
                FAIL_COUNT=$(echo "$EXECUTED_LINE" | grep -oE "with [0-9]+" | grep -oE "[0-9]+")
                FAILED="${FAIL_COUNT:-0}"
                PASSED=$((TOTAL - FAILED))
              fi
            fi
          fi

          echo "passed=$PASSED" >> "$GITHUB_OUTPUT"
          echo "failed=$FAILED" >> "$GITHUB_OUTPUT"
          echo "Tests: $PASSED passed, $FAILED failed"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED test(s) failed"
            echo ""
            echo "=== FAILED TESTS ==="
            grep -A 10 "failed" test-output.txt || true
            exit 1
          fi

      - name: Generate coverage report
        id: coverage
        if: always()
        working-directory: apps/BrainChat
        run: |
          PROFDATA=$(find .build -name "default.profdata" -type f 2>/dev/null | head -1)
          BINARY=$(find .build -name "BrainChatPackageTests.xctest" -type d 2>/dev/null | head -1)

          COVERAGE_PCT=0

          if [ -n "$PROFDATA" ] && [ -n "$BINARY" ]; then
            TEST_BINARY="$BINARY/Contents/MacOS/BrainChatPackageTests"
            if [ -f "$TEST_BINARY" ]; then
              COVERAGE_JSON=$(xcrun llvm-cov export "$TEST_BINARY" \
                -instr-profile="$PROFDATA" \
                -summary-only 2>/dev/null || true)

              if [ -n "$COVERAGE_JSON" ]; then
                COVERAGE_PCT=$(echo "$COVERAGE_JSON" | python3 -c "import sys,json;d=json.load(sys.stdin);t=d.get('data',[{}])[0].get('totals',{}).get('lines',{});print(f\"{t.get('percent',0):.1f}\")" 2>/dev/null || echo "0")

                # Generate detailed text report
                xcrun llvm-cov report "$TEST_BINARY" \
                  -instr-profile="$PROFDATA" \
                  2>/dev/null | tee coverage-report.txt || true
              fi
            fi
          fi

          echo "coverage_pct=$COVERAGE_PCT" >> "$GITHUB_OUTPUT"
          echo "Coverage: ${COVERAGE_PCT}%"

          # Enforce threshold
          THRESHOLD=${{ env.COVERAGE_THRESHOLD }}
          PASS=$(python3 -c "print('yes' if float('$COVERAGE_PCT') >= float('$THRESHOLD') else 'no')" 2>/dev/null || echo "no")

          if [ "$PASS" != "yes" ]; then
            echo "::warning::Coverage ${COVERAGE_PCT}% is below ${THRESHOLD}% threshold"
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: apps/BrainChat/coverage-report.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload test output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results
          path: apps/BrainChat/test-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Unit test summary
        if: always()
        run: |
          echo "## 2. Unit Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Metric | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|--------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Passed | ${{ steps.results.outputs.passed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Failed | ${{ steps.results.outputs.failed }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Coverage | ${{ steps.coverage.outputs.coverage_pct }}% |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Threshold | ${{ env.COVERAGE_THRESHOLD }}% |" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # 3. VOICE TESTS - Voice system tests with mocked audio
  # ==========================================================================
  voice-tests:
    name: "3. Voice System Tests"
    runs-on: macos-14
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build for testing
        working-directory: apps/BrainChat
        run: swift build --build-tests 2>&1 | tail -10

      - name: Run voice manager tests
        working-directory: apps/BrainChat
        run: |
          echo "=== Voice System Tests ==="

          swift test \
            --filter "VoiceManagerTests" \
            2>&1 | tee voice-test-output.txt

          VOICE_EXIT=$?

          echo ""
          echo "=== Results ==="
          grep -E "(Test Case|passed|failed|Executed)" voice-test-output.txt || true

          exit $VOICE_EXIT

      - name: Run speech manager tests
        working-directory: apps/BrainChat
        run: |
          echo "=== Speech Recognition Tests ==="

          swift test \
            --filter "SpeechManagerTests" \
            2>&1 | tee speech-test-output.txt

          SPEECH_EXIT=$?

          echo ""
          echo "=== Results ==="
          grep -E "(Test Case|passed|failed|Executed)" speech-test-output.txt || true

          exit $SPEECH_EXIT

      - name: Verify voice accessibility
        working-directory: apps/BrainChat
        run: |
          echo "=== Voice Accessibility Checks ==="
          ISSUES=0

          # VoiceManager must have VoiceOver announcements
          if grep -q "NSAccessibility\|accessibilityElement\|UIAccessibility.post" VoiceManager.swift 2>/dev/null; then
            echo "VoiceManager: VoiceOver integration present"
          else
            echo "::warning::VoiceManager: No VoiceOver announcement calls found"
            ISSUES=$((ISSUES + 1))
          fi

          # SpeechManager must handle recognition errors accessibly
          if grep -q "accessibilityLabel\|accessibilityHint\|announcement" SpeechManager.swift 2>/dev/null; then
            echo "SpeechManager: Accessible error handling present"
          else
            echo "::warning::SpeechManager: Consider adding accessible error announcements"
          fi

          # AudioPlayer/AudioSession accessibility
          for FILE in AudioPlayer.swift AudioSession.swift; do
            if [ -f "$FILE" ]; then
              echo "$FILE: exists"
            fi
          done

          echo ""
          echo "Voice accessibility issues: $ISSUES"

      - name: Upload voice test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: voice-test-results
          path: |
            apps/BrainChat/voice-test-output.txt
            apps/BrainChat/speech-test-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Voice test summary
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## 3. Voice Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for FILE in voice-test-output.txt speech-test-output.txt; do
            if [ -f "$FILE" ]; then
              SUITE=$(echo "$FILE" | sed 's/-test-output.txt//')
              PASSED=$(grep -cE "Test Case.*passed" "$FILE" 2>/dev/null || echo "0")
              FAILED=$(grep -cE "Test Case.*failed" "$FILE" 2>/dev/null || echo "0")
              echo "**${SUITE}**: ${PASSED} passed, ${FAILED} failed" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  # ==========================================================================
  # 4. LLM TESTS - LLM integration tests with mocked APIs
  # ==========================================================================
  llm-tests:
    name: "4. LLM Integration Tests"
    runs-on: macos-14
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build for testing
        working-directory: apps/BrainChat
        run: swift build --build-tests 2>&1 | tail -10

      - name: Run AI manager tests
        working-directory: apps/BrainChat
        run: |
          echo "=== LLM Integration Tests (Mocked APIs) ==="

          swift test \
            --filter "AIManagerTests" \
            2>&1 | tee llm-test-output.txt

          LLM_EXIT=$?

          echo ""
          echo "=== Results ==="
          grep -E "(Test Case|passed|failed|Executed)" llm-test-output.txt || true

          exit $LLM_EXIT

      - name: Run Copilot bridge tests
        working-directory: apps/BrainChat
        run: |
          echo "=== Copilot Bridge Tests ==="

          swift test \
            --filter "CopilotBridgeTests" \
            2>&1 | tee copilot-test-output.txt

          COPILOT_EXIT=$?

          echo ""
          echo "=== Results ==="
          grep -E "(Test Case|passed|failed|Executed)" copilot-test-output.txt || true

          exit $COPILOT_EXIT

      - name: Verify LLM error handling
        working-directory: apps/BrainChat
        run: |
          echo "=== LLM Safety Checks ==="
          ISSUES=0

          # AIManager must handle API failures gracefully
          if grep -q "catch\|do.*try\|Result<\|throws" AIManager.swift 2>/dev/null; then
            echo "AIManager: Error handling present"
          else
            echo "::error::AIManager: No error handling found"
            ISSUES=$((ISSUES + 1))
          fi

          # API keys must never be hardcoded
          for FILE in AIManager.swift CopilotBridge.swift APIKeyManager.swift; do
            if [ -f "$FILE" ]; then
              if grep -qE '(sk-[a-zA-Z0-9]{20,}|"key-[a-zA-Z0-9]+")' "$FILE" 2>/dev/null; then
                echo "::error::$FILE: Potential hardcoded API key detected!"
                ISSUES=$((ISSUES + 1))
              else
                echo "$FILE: No hardcoded keys"
              fi
            fi
          done

          # Timeout must be configured on network calls
          if grep -q "timeout\|TimeInterval\|URLSessionConfiguration" AIManager.swift 2>/dev/null; then
            echo "AIManager: Timeout configuration present"
          else
            echo "::warning::AIManager: Consider adding explicit request timeouts"
          fi

          if [ "$ISSUES" -gt 0 ]; then
            echo "::error::$ISSUES critical LLM issue(s) found"
            exit 1
          fi

      - name: Upload LLM test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: llm-test-results
          path: |
            apps/BrainChat/llm-test-output.txt
            apps/BrainChat/copilot-test-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: LLM test summary
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## 4. LLM Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          for FILE in llm-test-output.txt copilot-test-output.txt; do
            if [ -f "$FILE" ]; then
              SUITE=$(echo "$FILE" | sed 's/-test-output.txt//' | sed 's/-/ /g')
              PASSED=$(grep -cE "Test Case.*passed" "$FILE" 2>/dev/null || echo "0")
              FAILED=$(grep -cE "Test Case.*failed" "$FILE" 2>/dev/null || echo "0")
              echo "**${SUITE}**: ${PASSED} passed, ${FAILED} failed" >> "$GITHUB_STEP_SUMMARY"
              echo "" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

  # ==========================================================================
  # 5. ACCESSIBILITY TESTS - WCAG 2.1 AA audit, ZERO violations
  # ==========================================================================
  accessibility-tests:
    name: "5. Accessibility Audit (ZERO violations)"
    runs-on: macos-14
    needs: build
    timeout-minutes: 15

    outputs:
      violations: ${{ steps.audit.outputs.violations }}
      files-scanned: ${{ steps.audit.outputs.files_scanned }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: WCAG 2.1 AA audit - Labels & descriptions
        id: audit
        working-directory: apps/BrainChat
        run: |
          echo "============================================"
          echo "  WCAG 2.1 AA Accessibility Audit"
          echo "  ZERO violations policy"
          echo "============================================"
          echo ""

          VIOLATIONS=0
          WARNINGS=0
          TOTAL_FILES=0

          SWIFT_FILES=$(find . -maxdepth 2 -name "*.swift" -not -path "./.build/*" -not -path "*/Tests/*" | sort)

          for FILE in $SWIFT_FILES; do
            [ -f "$FILE" ] || continue
            TOTAL_FILES=$((TOTAL_FILES + 1))
            BASENAME=$(basename "$FILE")
            FILE_ISSUES=0

            # WCAG 1.1.1 - Non-text Content
            # Every Image() must have accessibility description
            IMAGES=$(grep -c 'Image(' "$FILE" 2>/dev/null || true)
            IMG_A11Y=$(grep -c 'decorative\|accessibilityLabel\|accessibilityHidden\|\.accessibilityLabel' "$FILE" 2>/dev/null || true)
            if [ "$IMAGES" -gt 0 ] && [ "$IMG_A11Y" -eq 0 ]; then
              echo "::error file=$FILE::WCAG 1.1.1 VIOLATION: $BASENAME has $IMAGES Image(s) without accessibility labels"
              VIOLATIONS=$((VIOLATIONS + 1))
              FILE_ISSUES=$((FILE_ISSUES + 1))
            fi

            # WCAG 4.1.2 - Name, Role, Value
            # Every Button() must have accessible name
            BUTTONS=$(grep -c 'Button(' "$FILE" 2>/dev/null || true)
            BTN_A11Y=$(grep -c 'accessibilityLabel\|\.accessibilityLabel\|\.help(' "$FILE" 2>/dev/null || true)
            if [ "$BUTTONS" -gt 2 ] && [ "$BTN_A11Y" -eq 0 ]; then
              echo "::error file=$FILE::WCAG 4.1.2 VIOLATION: $BASENAME has $BUTTONS Button(s) but no accessibility labels"
              VIOLATIONS=$((VIOLATIONS + 1))
              FILE_ISSUES=$((FILE_ISSUES + 1))
            fi

            # WCAG 2.4.3 - Focus Order
            # Files with interactive elements should have focus management
            INTERACTIVE=$(grep -cE 'Button\(|TextField\(|TextEditor\(|Toggle\(|Slider\(|Picker\(' "$FILE" 2>/dev/null || true)
            FOCUS_MGMT=$(grep -cE 'FocusState|focusable|AccessibilityFocusState|@FocusState' "$FILE" 2>/dev/null || true)
            if [ "$INTERACTIVE" -gt 3 ] && [ "$FOCUS_MGMT" -eq 0 ]; then
              echo "::warning file=$FILE::WCAG 2.4.3: $BASENAME has $INTERACTIVE interactive elements but no focus management"
              WARNINGS=$((WARNINGS + 1))
            fi

            # WCAG 2.1.1 - Keyboard Accessible
            # Check for keyboard shortcuts on key actions
            KEYBOARD=$(grep -c 'keyboardShortcut\|onKeyPress\|KeyboardShortcut' "$FILE" 2>/dev/null || true)
            if [ "$INTERACTIVE" -gt 5 ] && [ "$KEYBOARD" -eq 0 ]; then
              echo "::warning file=$FILE::WCAG 2.1.1: $BASENAME has many interactive elements but no keyboard shortcuts"
              WARNINGS=$((WARNINGS + 1))
            fi

            if [ "$FILE_ISSUES" -eq 0 ]; then
              echo "$BASENAME: PASS"
            fi
          done

          echo ""
          echo "============================================"
          echo "  Audit Results"
          echo "============================================"
          echo "Files scanned:  $TOTAL_FILES"
          echo "Violations:     $VIOLATIONS"
          echo "Warnings:       $WARNINGS"
          echo ""

          echo "violations=$VIOLATIONS" >> "$GITHUB_OUTPUT"
          echo "warnings=$WARNINGS" >> "$GITHUB_OUTPUT"
          echo "files_scanned=$TOTAL_FILES" >> "$GITHUB_OUTPUT"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo "::error::WCAG 2.1 AA audit FAILED with $VIOLATIONS violation(s). Fix ALL violations before merging."
            exit 1
          fi

          echo "WCAG 2.1 AA: ALL CLEAR"

      - name: VoiceOver readiness check
        working-directory: apps/BrainChat
        run: |
          echo "=== VoiceOver Readiness ==="
          echo ""

          SWIFT_FILES=$(find . -maxdepth 2 -name "*.swift" -not -path "./.build/*" -not -path "*/Tests/*" | sort)

          VO_SUPPORT=$(grep -rl 'UIAccessibility.post\|NSAccessibility\|accessibilityElement\|AccessibilityFocusState\|accessibilityAction\|accessibilityAdjustableAction' $SWIFT_FILES 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with VoiceOver support: $VO_SUPPORT"

          FOCUS_FILES=$(grep -rl 'FocusState\|focusable\|@FocusState\|AccessibilityFocusState' $SWIFT_FILES 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with focus management: $FOCUS_FILES"

          ANNOUNCE=$(grep -rl 'announcement\|accessibilityNotification\|NSAccessibility.Notification' $SWIFT_FILES 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with announcements: $ANNOUNCE"

          HEADING=$(grep -rl 'accessibilityAddTraits.*isHeader\|\.isHeader\|accessibilityHeading' $SWIFT_FILES 2>/dev/null | wc -l | tr -d ' ')
          echo "Files with heading traits: $HEADING"

          # Check ChatMessage model has accessibilityDescription
          if [ -f "Models.swift" ]; then
            if grep -q 'accessibilityDescription' Models.swift; then
              echo "ChatMessage model: accessibilityDescription present"
            else
              echo "::error::ChatMessage model MUST have accessibilityDescription for VoiceOver"
              exit 1
            fi
          fi

      - name: Contrast and visual checks
        working-directory: apps/BrainChat
        run: |
          echo "=== Visual Accessibility Checks ==="

          SWIFT_FILES=$(find . -maxdepth 2 -name "*.swift" -not -path "./.build/*" -not -path "*/Tests/*" | sort)

          # WCAG 1.4.1 - Use of Color
          # Check for color-only indicators
          COLOR_ONLY=$(grep -rn 'foregroundColor\|\.red\|\.green\|\.blue' $SWIFT_FILES 2>/dev/null | grep -v 'accessibilityLabel\|accessibilityHint\|//\|systemName' | wc -l | tr -d ' ')
          echo "Color usage instances to verify: $COLOR_ONLY"
          if [ "$COLOR_ONLY" -gt 0 ]; then
            echo "::notice::Verify these color uses don't rely on color alone to convey information (WCAG 1.4.1)"
          fi

          # WCAG 1.4.11 - Non-text Contrast
          # Check focus indicators exist
          FOCUS_RING=$(grep -rc 'focusedBorder\|outline\|\.focused\|focusRingType' $SWIFT_FILES 2>/dev/null | grep -v ":0$" | wc -l | tr -d ' ')
          echo "Files with focus indicators: $FOCUS_RING"

          # Dynamic Type support
          DYN_TYPE=$(grep -rc '\.font(.*\.body\|\.font(.*\.headline\|\.font(.*\.title\|@ScaledMetric\|dynamicTypeSize' $SWIFT_FILES 2>/dev/null | grep -v ":0$" | wc -l | tr -d ' ')
          echo "Files supporting Dynamic Type: $DYN_TYPE"

          echo ""
          echo "Visual checks complete"

      - name: Accessibility summary
        if: always()
        run: |
          echo "## 5. Accessibility Audit" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Check | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Files scanned | ${{ steps.audit.outputs.files_scanned }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WCAG violations | ${{ steps.audit.outputs.violations }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| WCAG warnings | ${{ steps.audit.outputs.warnings }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Policy | ZERO violations |" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # 6. E2E TESTS - Full end-to-end suite
  # ==========================================================================
  e2e-tests:
    name: "6. End-to-End Tests"
    runs-on: macos-14
    needs: [unit-tests, voice-tests, llm-tests]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve dependencies
        working-directory: apps/BrainChat
        run: swift package resolve

      - name: Build for testing
        working-directory: apps/BrainChat
        run: swift build --build-tests 2>&1 | tail -10

      - name: Run integration tests
        working-directory: apps/BrainChat
        run: |
          echo "=== End-to-End Integration Tests ==="

          swift test \
            --filter "IntegrationTests" \
            2>&1 | tee e2e-test-output.txt

          E2E_EXIT=$?

          echo ""
          echo "=== Results ==="
          grep -E "(Test Case|passed|failed|Executed)" e2e-test-output.txt || true

          exit $E2E_EXIT

      - name: Run full test suite (smoke check)
        working-directory: apps/BrainChat
        run: |
          echo "=== Full Suite Smoke Check ==="

          swift test --parallel 2>&1 | tee full-test-output.txt
          FULL_EXIT=$?

          echo ""
          EXECUTED=$(grep -oE "Executed [0-9]+ tests?" full-test-output.txt | tail -1)
          FAILURES=$(grep -oE "with [0-9]+ failures?" full-test-output.txt | tail -1)
          echo "Summary: $EXECUTED $FAILURES"

          if [ "$FULL_EXIT" -ne 0 ]; then
            echo ""
            echo "::error::E2E full suite FAILED"
            echo ""
            echo "=== FAILURES ==="
            grep -B 2 -A 10 "failed" full-test-output.txt || true
          fi

          exit $FULL_EXIT

      - name: Compile check all sources
        working-directory: apps/BrainChat
        run: |
          echo "=== Final Compile Verification ==="

          SWIFT_FILES=$(find . -maxdepth 1 -name '*.swift' ! -name 'CartesiaVoice.swift' | sort)
          FILE_COUNT=$(echo "$SWIFT_FILES" | wc -l | tr -d ' ')
          echo "Source files: $FILE_COUNT"

          SDK=$(xcrun --show-sdk-path)

          swiftc \
            -typecheck \
            -target arm64-apple-macosx14.0 \
            -sdk "$SDK" \
            -framework SwiftUI \
            -framework AppKit \
            -framework Speech \
            -framework AVFoundation \
            -framework Foundation \
            -swift-version 5 \
            $SWIFT_FILES 2>&1

          echo "All $FILE_COUNT sources compile cleanly"

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            apps/BrainChat/e2e-test-output.txt
            apps/BrainChat/full-test-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: E2E summary
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## 6. E2E Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f full-test-output.txt ]; then
            EXECUTED=$(grep -oE "Executed [0-9]+ tests?" full-test-output.txt | tail -1 || echo "N/A")
            FAILURES=$(grep -oE "with [0-9]+ failures?" full-test-output.txt | tail -1 || echo "N/A")
            echo "Full suite: $EXECUTED, $FAILURES" >> "$GITHUB_STEP_SUMMARY"
          fi

  # ==========================================================================
  # 7. PACKAGE - Create DMG, sign, upload artifacts
  # ==========================================================================
  package:
    name: "7. Package & Sign"
    runs-on: macos-14
    needs: [accessibility-tests, e2e-tests]
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release app
        working-directory: apps/BrainChat
        run: |
          chmod +x build.sh
          ./build.sh --clean

      - name: Code sign (ad-hoc)
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "::error::App bundle not found"
            exit 1
          fi

          cat > build/entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <false/>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.personal-information.speech-recognition</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - \
            --entitlements build/entitlements.plist \
            "$APP_PATH"

          echo "=== Signature Verification ==="
          codesign --verify --deep --strict "$APP_PATH" \
            && echo "Signature valid" \
            || echo "::warning::Ad-hoc signature check info (expected in CI)"

      - name: Create DMG installer
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"
          VERSION=$(date +%Y%m%d)-${GITHUB_SHA::8}
          DMG_NAME="BrainChat-${VERSION}.dmg"
          DMG_PATH="build/${DMG_NAME}"
          STAGING="build/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "${{ env.APP_NAME }}" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "$DMG_PATH"

          rm -rf "$STAGING"

          echo "=== DMG Info ==="
          ls -lh "$DMG_PATH"

          # Verify DMG mounts
          MOUNT_OUT=$(hdiutil attach "$DMG_PATH" -nobrowse -noverify 2>&1)
          MOUNT_POINT=$(echo "$MOUNT_OUT" | grep -oE '/Volumes/[^\t]+' | head -1)
          if [ -n "$MOUNT_POINT" ]; then
            echo "DMG mounts correctly"
            if [ -d "$MOUNT_POINT/Brain Chat.app" ]; then
              echo "App found inside DMG"
            else
              echo "::error::App NOT found inside DMG"
              exit 1
            fi
            hdiutil detach "$MOUNT_POINT" -quiet
          else
            echo "::error::DMG failed to mount"
            exit 1
          fi

          echo "$DMG_NAME" > build/dmg-name.txt

      - name: Upload Brain Chat.app
        uses: actions/upload-artifact@v4
        with:
          name: BrainChat-app
          path: apps/BrainChat/build/Brain Chat.app
          retention-days: 30

      - name: Upload Brain Chat DMG
        uses: actions/upload-artifact@v4
        with:
          name: BrainChat-dmg
          path: apps/BrainChat/build/BrainChat-*.dmg
          retention-days: 30

      - name: Upload all test reports
        uses: actions/upload-artifact@v4
        with:
          name: all-test-reports
          path: |
            apps/BrainChat/test-output.txt
            apps/BrainChat/coverage-report.txt
            apps/BrainChat/voice-test-output.txt
            apps/BrainChat/speech-test-output.txt
            apps/BrainChat/llm-test-output.txt
            apps/BrainChat/copilot-test-output.txt
            apps/BrainChat/e2e-test-output.txt
            apps/BrainChat/full-test-output.txt
          retention-days: 30
          if-no-files-found: ignore

      - name: Package summary
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## 7. Package" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          APP_PATH="build/Brain Chat.app"
          if [ -d "$APP_PATH" ]; then
            BINARY_SIZE=$(du -sh "$APP_PATH/Contents/MacOS/BrainChat" 2>/dev/null | cut -f1 || echo "N/A")
            BUNDLE_SIZE=$(du -sh "$APP_PATH" 2>/dev/null | cut -f1 || echo "N/A")
            echo "| Artifact | Size |" >> "$GITHUB_STEP_SUMMARY"
            echo "|----------|------|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Binary | $BINARY_SIZE |" >> "$GITHUB_STEP_SUMMARY"
            echo "| App bundle | $BUNDLE_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi

          DMG=$(ls build/BrainChat-*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            DMG_SIZE=$(du -sh "$DMG" | cut -f1)
            echo "| DMG installer | $DMG_SIZE |" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Signing: ad-hoc" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Artifacts uploaded**: Brain Chat.app, BrainChat DMG, Test reports, Coverage report" >> "$GITHUB_STEP_SUMMARY"

  # ==========================================================================
  # GATE - Final status check (required for branch protection)
  # ==========================================================================
  gate:
    name: "All Checks Passed"
    runs-on: macos-14
    if: always()
    needs: [build, unit-tests, voice-tests, llm-tests, accessibility-tests, e2e-tests, package]
    timeout-minutes: 5

    steps:
      - name: Evaluate pipeline
        run: |
          echo "============================================"
          echo "  BrainChat Master CI/CD - Final Gate"
          echo "============================================"
          echo ""

          FAILED=0

          check_job() {
            local NAME="$1"
            local RESULT="$2"

            if [ "$RESULT" = "success" ]; then
              echo "  $NAME: PASS"
            else
              echo "  $NAME: FAIL ($RESULT)"
              FAILED=$((FAILED + 1))
            fi
          }

          check_job "1. Build"         "${{ needs.build.result }}"
          check_job "2. Unit Tests"    "${{ needs.unit-tests.result }}"
          check_job "3. Voice Tests"   "${{ needs.voice-tests.result }}"
          check_job "4. LLM Tests"     "${{ needs.llm-tests.result }}"
          check_job "5. Accessibility" "${{ needs.accessibility-tests.result }}"
          check_job "6. E2E Tests"     "${{ needs.e2e-tests.result }}"
          check_job "7. Package"       "${{ needs.package.result }}"

          echo ""
          echo "============================================"

          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED job(s) failed. Fix all failures before merging."
            echo ""
            echo "  MERGE BLOCKED - All 7 jobs must pass."
            echo "  Push fixes and the pipeline will re-run."
            echo ""
            echo "============================================"
            exit 1
          fi

          echo ""
          echo "  ALL 7 JOBS PASSED"
          echo "  Ready to merge."
          echo ""
          echo "============================================"

      - name: Final summary
        if: always()
        run: |
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Master CI/CD Gate" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 1. Build | ${{ needs.build.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 2. Unit Tests | ${{ needs.unit-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 3. Voice Tests | ${{ needs.voice-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 4. LLM Tests | ${{ needs.llm-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 5. Accessibility | ${{ needs.accessibility-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 6. E2E Tests | ${{ needs.e2e-tests.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 7. Package | ${{ needs.package.result }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          TOTAL_PASS=0
          for RESULT in \
            "${{ needs.build.result }}" \
            "${{ needs.unit-tests.result }}" \
            "${{ needs.voice-tests.result }}" \
            "${{ needs.llm-tests.result }}" \
            "${{ needs.accessibility-tests.result }}" \
            "${{ needs.e2e-tests.result }}" \
            "${{ needs.package.result }}"; do
            if [ "$RESULT" = "success" ]; then
              TOTAL_PASS=$((TOTAL_PASS + 1))
            fi
          done

          echo "**Result: ${TOTAL_PASS}/7 passed**" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ "$TOTAL_PASS" -eq 7 ]; then
            echo "**MERGE ALLOWED** - All checks green." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**MERGE BLOCKED** - Fix failures and push again." >> "$GITHUB_STEP_SUMMARY"
          fi
