name: Agentic Brain CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEFAULT_LLM_PROVIDER: mock
  TESTING: 'true'
  COVERAGE_PYTHON: '3.11'

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev,test]"

      - name: Black format check
        run: black --check src tests scripts

      - name: Ruff lint
        run: ruff check src tests

      - name: Type check
        run: mypy src/agentic_brain --ignore-missing-imports

  security:
    name: Security Roles Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Verify all security roles exist
        run: |
          python -c "
          from agentic_brain.security.roles import SecurityRole
          
          required_roles = ['FULL_ADMIN', 'SAFE_ADMIN', 'USER', 'GUEST']
          defined_roles = [r.name for r in SecurityRole]
          
          for role in required_roles:
              if role not in defined_roles:
                  print(f'❌ Required role missing: {role}')
                  exit(1)
              print(f'✅ {role} role verified')
          
          print(f'✅ All {len(required_roles)} security roles exist')
          "

      - name: Test full admin permissions
        run: pytest tests/test_security_roles.py::TestRolePermissions::test_full_admin_has_unrestricted_permissions -v

      - name: Test safe admin permissions
        run: pytest tests/test_security_roles.py::TestRolePermissions::test_safe_admin_requires_guardrails -v

      - name: Test user permissions
        run: pytest tests/test_security_roles.py::TestRolePermissions::test_user_is_api_only -v

      - name: Test guest permissions
        run: pytest tests/test_security_roles.py::TestRolePermissions::test_guest_is_help_only -v

      - name: Test role ordering
        run: pytest tests/test_security_roles.py::TestSecurityRoles::test_role_ordering -v

      - name: Test dangerous command detection
        run: pytest tests/test_security_roles.py::TestDangerousCommandDetection -v

      - name: Test security guard
        run: pytest tests/test_security_roles.py::TestSecurityGuard -v

      - name: Fail if any role is missing
        run: |
          python -c "
          from agentic_brain.security.roles import SecurityRole
          
          # This will fail if not all roles are properly defined
          roles = list(SecurityRole)
          if len(roles) < 4:
              print(f'❌ CRITICAL: Only {len(roles)} roles found, expected at least 4')
              exit(1)
          
          # Verify each role has proper value
          for role in roles:
              if not hasattr(role, 'value') or not role.value:
                  print(f'❌ CRITICAL: Role {role.name} has no value')
                  exit(1)
          
          print(f'✅ Security role CI check complete: {len(roles)} roles verified')
          "

  unit:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: [lint, security]
    timeout-minutes: 35

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,api,llm]"

      - name: Run unit tests
        run: |
          if [ "${{ matrix.python-version }}" = "$COVERAGE_PYTHON" ]; then
            pytest tests/ \
              --ignore=tests/integration \
              --ignore=tests/e2e \
              -m "not integration and not requires_redis and not requires_neo4j and not requires_temporal and not requires_docker and not requires_firebase and not requires_kafka and not slow and not skip_ci" \
              -n auto \
              --maxprocesses=4 \
              -v --tb=short \
              --cov=agentic_brain \
              --cov-report=xml \
              --cov-report=term-missing
          else
            pytest tests/ \
              --ignore=tests/integration \
              --ignore=tests/e2e \
              -m "not integration and not requires_redis and not requires_neo4j and not requires_temporal and not requires_docker and not requires_firebase and not requires_kafka and not slow and not skip_ci" \
              -n auto \
              --maxprocesses=4 \
              -v --tb=short
          fi

      - name: Upload coverage artifact
        if: matrix.python-version == env.COVERAGE_PYTHON
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Upload coverage to Codecov
        if: matrix.python-version == env.COVERAGE_PYTHON
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 40

    services:
      neo4j:
        image: neo4j:5-community
        env:
          NEO4J_AUTH: neo4j/testpassword
        ports:
          - 7687:7687
        options: >-
          --health-cmd="cypher-shell -u neo4j -p testpassword 'RETURN 1' || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      REDIS_PORT: '6379'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,api,llm,graphrag,redis]"

      - name: Wait for Neo4j and Redis
        run: |
          python - <<'PY'
          import time
          from neo4j import GraphDatabase
          import redis

          deadline = time.time() + 180
          while time.time() < deadline:
              try:
                  driver = GraphDatabase.driver(
                      'bolt://localhost:7687', auth=('neo4j', 'testpassword')
                  )
                  driver.verify_connectivity()
                  driver.close()
                  redis.Redis(host='localhost', port=6379, db=0).ping()
                  print('Services are ready')
                  break
              except Exception as exc:
                  print(f'Waiting for services: {exc}')
                  time.sleep(5)
          else:
              raise SystemExit('Neo4j or Redis did not become ready in time')
          PY

      - name: Run integration tests
        run: |
          pytest \
            tests/integration \
            tests/test_integration.py \
            tests/test_streaming.py \
            tests/test_memory.py \
            tests/test_smart_router.py \
            -m "integration and not requires_firebase and not requires_temporal and not requires_kafka and not skip_ci" \
            -v --tb=short

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: integration
    timeout-minutes: 35

    env:
      RUN_TEMPORAL_E2E: 'false'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,api,llm]"

      - name: Run E2E tests
        run: pytest tests/e2e -v --tb=short -m "not skip_ci"

  performance:
    name: Performance & benchmark checks
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,llm]"

      - name: Run benchmark regression tests
        run: |
          pytest \
            tests/test_benchmark.py \
            tests/test_brain_benchmark_trends.py \
            tests/test_chonkie_chunker.py \
            -v --tb=short

      - name: Run lightweight benchmark smoke
        run: |
          python scripts/run-benchmark.py \
            --iterations 1 \
            --skip-llm \
            --skip-neo4j \
            --skip-voice \
            --output-dir .benchmarks/ci

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-artifacts
          path: .benchmarks/ci
          if-no-files-found: warn

  compatibility:
    name: Compatibility (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: unit
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test]"

      - name: Run compatibility tests
        run: pytest tests/ -k "compat" -v --tb=short
