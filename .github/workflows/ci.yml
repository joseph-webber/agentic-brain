name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash
    working-directory: .

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Run black format check
        run: black --check --exclude 'installer\.py' src/ tests/ examples/ scripts/

      - name: Run ruff linting
        run: ruff check src/ tests/
        continue-on-error: true

      - name: Run mypy type checking
        run: mypy src/agentic_brain --ignore-missing-imports
        continue-on-error: true

      - name: Verify Apache 2.0 LICENSE file
        run: |
          if ! grep -q "Apache License" LICENSE; then
            echo "❌ LICENSE file is not Apache 2.0"
            exit 1
          fi
          echo "✅ LICENSE file is Apache 2.0"

      - name: Check Apache 2.0 license headers
        run: |
          echo "Checking for Apache 2.0 license headers via helper script..."
          python3 scripts/check_license_headers.py

      - name: License compliance guardrails
        run: |
          echo "Checking for incorrect GPL license references..."
          if grep -r --include="*.py" --include="*.md" --include="*.yml" \
             -E "GPL|GNU General Public License" \
             --exclude-dir=.venv* --exclude-dir=venv --exclude-dir=build --exclude-dir=node_modules \
             ./src ./docs ./tests ./*.md 2>/dev/null | \
             grep -v "license-check" | \
             grep -v "Differences from GPL" | \
             grep -v "Feature | Apache 2.0 | GPL" | \
             grep -v "Must use GPL" | \
             grep -v "more licenses than GPL" | \
             grep -v "copyleft licenses (GPL" | \
             grep -v "not introduce other copyleft"; then
            echo "ERROR: Found GPL references! This project is Apache-2.0"
            echo "Please fix the files listed above"
            exit 1
          fi
          echo "✅ No incorrect GPL references found"

          echo "Verifying Apache-2.0 in key files..."
          if ! grep -q "Apache License" LICENSE; then
            echo "ERROR: LICENSE file doesn't contain Apache License"
            exit 1
          fi
          if ! grep -q 'Apache-2.0' pyproject.toml; then
            echo "ERROR: pyproject.toml doesn't specify Apache-2.0"
            exit 1
          fi
          echo "✅ Apache-2.0 properly configured"

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 30

    env:
      DEFAULT_LLM_PROVIDER: mock
      TESTING: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,dev,api,llm]"

      - name: Run Voice CI tests
        run: |
          pytest tests/test_voice_ci.py -v --tb=short
          echo "✅ Voice CI tests passed"

      - name: Run ADL parser tests
        run: |
          pytest tests/test_adl_comprehensive_parser_only.py -v --tb=short
          echo "✅ ADL parser tests passed"

      - name: Collect WooCommerce test summary
        run: |
          mapfile -t commerce_tests < <(find tests -type f -name '*.py' \( -name '*woo*' -o -name '*commerce*' -o -name '*wordpress*' \) | sort)
          python -m pytest "${commerce_tests[@]}" --collect-only 2>&1 | tail -30

      - name: Run WooCommerce and WordPress commerce tests
        run: |
          mapfile -t commerce_tests < <(find tests -type f -name '*.py' \( -name '*woo*' -o -name '*commerce*' -o -name '*wordpress*' \) | sort)
          pytest "${commerce_tests[@]}" \
            --ignore=tests/e2e \
            -m "not integration" \
            -v --tb=short

      - name: Run unit test suite
        run: |
          pytest tests/ \
            --ignore=tests/e2e \
            --ignore=tests/test_infrastructure.py \
            --ignore=tests/test_cultural_sensitivity.py \
            --ignore=tests/test_demo_auth.py \
            --ignore=tests/test_documented_features.py \
            --ignore=tests/test_devops_loaders.py \
            --ignore=tests/test_installer_enhanced.py \
            --ignore=tests/test_new_loaders.py \
            --ignore=tests/test_voice_ci.py \
            --ignore=tests/test_adl_comprehensive_parser_only.py \
            --ignore=tests/test_speed_profiles.py \
            --ignore=tests/test_voice_phase3_integration.py \
            --ignore=tests/test_voice_no_overlap.py \
            --ignore=tests/test_voice_system.py \
            --ignore=tests/test_voice_stream.py \
            --ignore=tests/test_spatial_audio.py \
            --ignore=tests/test_speech_lock.py \
            --ignore=tests/test_voice_safety.py \
            --ignore=tests/test_voice_resilient.py \
            -m "not integration" \
            -n auto \
            --maxprocesses=4 \
            -v --tb=short \
            --cov=agentic_brain \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml

  integration:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 45
    continue-on-error: true

    env:
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: Brain2026
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_PASSWORD: Brain2026
      REDIS_URL: redis://:Brain2026@localhost:6379/0
      KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      DEFAULT_LLM_PROVIDER: mock
      TESTING: "true"
      CI_RUN_INTEGRATION: "1"
      CI_RUN_E2E: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Start services (Docker Compose)
        run: |
          set -euo pipefail
          echo "🚀 Starting infrastructure with Docker Compose (docker-compose.yml)..."

          cat > .env.docker << 'ENVEOF'
          NEO4J_PASSWORD=Brain2026
          REDIS_PASSWORD=Brain2026
          KAFKA_BOOTSTRAP_SERVERS=localhost:9092
          ENVEOF

          cat > docker-compose.ci.yml << 'OVERRIDEEOF'
          services:
            neo4j:
              image: neo4j:4.4-community
              environment:
                NEO4J_PLUGINS: '[]'
                NEO4J_dbms_memory_heap_initial__size: 256m
                NEO4J_dbms_memory_heap_max__size: 512m
              healthcheck:
                test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$${NEO4J_PASSWORD}\" \"RETURN 1\""]
                interval: 10s
                timeout: 10s
                retries: 30
                start_period: 60s
          OVERRIDEEOF

          COMPOSE="docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.ci.yml"

          wait_for_neo4j() {
            local timeout_seconds="${1:-900}"
            local poll_seconds="${2:-10}"
            local start_time
            start_time=$(date +%s)

            while true; do
              if $COMPOSE exec -T neo4j cypher-shell -u neo4j -p "${NEO4J_PASSWORD:-Brain2026}" "RETURN 1" >/dev/null 2>&1; then
                echo "✅ Neo4j is ready for Bolt traffic"
                return 0
              fi

              local container_id
              container_id="$($COMPOSE ps -q neo4j)"
              local status="not-created"
              if [ -n "$container_id" ]; then
                status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$container_id" 2>/dev/null || echo unknown)"
              fi

              if [ $(( $(date +%s) - start_time )) -ge "$timeout_seconds" ]; then
                echo "❌ Neo4j did not become ready within ${timeout_seconds}s (last status: ${status})"
                $COMPOSE ps
                $COMPOSE logs --no-color neo4j
                return 1
              fi

              echo "⏳ Neo4j status: ${status}"
              sleep "$poll_seconds"
            done
          }

          echo "🚀 Bringing up services (with --wait if supported)..."
          $COMPOSE up -d --wait --wait-timeout 900 neo4j redis redpanda || (
            echo "⚠️ docker compose --wait unavailable or failed; starting without wait" &&
            $COMPOSE up -d neo4j redis redpanda
          )

          echo "⏳ Waiting for Redis (max 120s)..."
          timeout 120 bash -c 'until docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.ci.yml exec -T redis redis-cli -a "${REDIS_PASSWORD:-Brain2026}" ping 2>/dev/null | grep -q PONG; do sleep 2; done'

          echo "⏳ Waiting for Redpanda (max 180s)..."
          timeout 180 bash -c 'until docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.ci.yml exec -T redpanda rpk cluster health >/dev/null 2>&1; do sleep 5; done'

          echo "⏳ Waiting for Neo4j (max 900s)..."
          wait_for_neo4j 900 10

          echo "✅ Services started!"
          $COMPOSE ps

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pyproject.toml

      - name: Install integration dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[test,dev,api,llm]"

      - name: Run integration tests
        run: |
          pytest tests/ \
            -m "integration" \
            -v --tb=short \
            --maxprocesses=2 \
            --timeout=120 || echo "Integration tests failed (allowed)"

      - name: Run installation E2E tests
        run: |
          if [ -f tests/e2e/test_installation.py ]; then
            pytest tests/e2e/test_installation.py -v --tb=short || echo "Installation tests failed (allowed)"
          fi

      - name: Show service logs on failure
        if: failure()
        run: docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.ci.yml logs

      - name: Stop services (Docker Compose)
        if: always()
        run: |
          if [ -f .env.docker ]; then
            docker compose --env-file .env.docker -f docker-compose.yml -f docker-compose.ci.yml down -v
          fi
