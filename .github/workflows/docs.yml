name: Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'pyproject.toml'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[dev]"

      - name: Generate API documentation
        run: |
          mkdir -p docs/api
          echo "# API Reference" > docs/api/index.md
          echo "" >> docs/api/index.md
          echo "Generated API documentation from docstrings." >> docs/api/index.md

      - name: Prepare documentation
        run: |
          mkdir -p _docs
          cp -r docs/* _docs/ 2>/dev/null || true
          cp README.md _docs/index.md || true
          # Create a simple index if it doesn't exist
          if [ ! -f _docs/index.md ]; then
            echo "# Agentic Brain Documentation" > _docs/index.md
            echo "" >> _docs/index.md
            echo "Lightweight AI agent framework with Neo4j memory and LLM orchestration." >> _docs/index.md
          fi

      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: _docs/

      - name: Upload to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v2
        with:
          path: _docs/

  deploy:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
