name: Documentation Quality

on:
  push:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'tests/test_readme_features.py'
      - 'tests/test_documented_features.py'
      - 'tests/test_doc_generator.py'
      - 'pyproject.toml'
  pull_request:
    paths:
      - 'docs/**'
      - 'README.md'
      - 'mkdocs.yml'
      - '.github/workflows/docs.yml'
      - 'tests/test_readme_features.py'
      - 'tests/test_documented_features.py'
      - 'tests/test_doc_generator.py'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Build docs and validate examples
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e ".[docs,test,llm,graphrag]"

      - name: Validate MkDocs navigation targets
        run: |
          python - <<'PY'
          import yaml
          from pathlib import Path

          mkdocs = yaml.safe_load(Path('mkdocs.yml').read_text(encoding='utf-8'))
          missing = []

          def walk(node):
              if isinstance(node, list):
                  for item in node:
                      walk(item)
              elif isinstance(node, dict):
                  for _, value in node.items():
                      walk(value)
              elif isinstance(node, str) and node.endswith('.md'):
                  path = Path('docs') / node
                  if not path.exists():
                      missing.append(str(path))

          walk(mkdocs.get('nav', []))
          if missing:
              raise SystemExit('Missing MkDocs nav targets: ' + ', '.join(sorted(missing)))
          print('MkDocs navigation targets are present')
          PY

      - name: Build documentation
        run: mkdocs build --strict

      - name: Validate documentation regressions
        run: |
          pytest \
            tests/test_readme_features.py \
            tests/test_documented_features.py \
            tests/test_doc_generator.py \
            -v --tb=short

      - name: Validate fenced Python examples
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          pattern = re.compile(r"```python\n(.*?)```", re.DOTALL)
          docs = [Path('README.md'), *sorted(Path('docs').rglob('*.md'))]
          checked = 0
          for doc in docs:
              text = doc.read_text(encoding='utf-8')
              for block in pattern.findall(text):
                  snippet = block.strip()
                  if not snippet or snippet.startswith('>>>'):
                      continue
                  compile(snippet, str(doc), 'exec')
                  checked += 1
          print(f'Compiled {checked} fenced Python example(s)')
          PY

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-site
          path: site
          if-no-files-found: error

  links:
    name: Link check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - name: Check local documentation links
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress --base . README.md docs mkdocs.yml
          fail: true

  deploy:
    name: Deploy docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [validate, links]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Download docs artifact
        uses: actions/download-artifact@v4
        with:
          name: docs-site
          path: site
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
