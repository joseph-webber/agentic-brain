name: BrainChat Build & Package

on:
  push:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/BrainChat/**'
      - '.github/workflows/brainchat-build.yml'
  workflow_dispatch:

concurrency:
  group: brainchat-build-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: "Brain Chat"
  BUNDLE_ID: "com.josephwebber.brainchat"
  MACOS_MIN: "14.0"

jobs:
  build:
    name: Build & Sign
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          echo "=== macOS Version ==="
          sw_vers
          echo ""
          echo "=== Xcode Version ==="
          xcodebuild -version
          echo ""
          echo "=== Swift Version ==="
          swift --version
          echo ""
          echo "=== SDK Path ==="
          xcrun --show-sdk-path

      - name: Verify Swift 5.9+
        run: |
          SWIFT_VERSION=$(swift --version 2>&1 | grep -oE '[0-9]+\.[0-9]+' | head -1)
          MAJOR=$(echo "$SWIFT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$SWIFT_VERSION" | cut -d. -f2)
          if [ "$MAJOR" -lt 5 ] || ([ "$MAJOR" -eq 5 ] && [ "$MINOR" -lt 9 ]); then
            echo "ERROR: Swift 5.9+ required, found $SWIFT_VERSION"
            exit 1
          fi
          echo "Swift $SWIFT_VERSION OK"

      - name: Run SPM tests
        working-directory: apps/BrainChat
        run: swift test --parallel

      - name: Build app bundle
        working-directory: apps/BrainChat
        run: |
          chmod +x build.sh
          ./build.sh --clean

      - name: Verify build output
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: App bundle not found at: $APP_PATH"
            exit 1
          fi

          BINARY="$APP_PATH/Contents/MacOS/BrainChat"
          if [ ! -f "$BINARY" ]; then
            echo "ERROR: Binary not found"
            exit 1
          fi

          echo "=== Binary info ==="
          file "$BINARY"
          echo ""
          echo "=== App bundle size ==="
          du -sh "$APP_PATH"
          echo ""
          echo "=== Bundle contents ==="
          find "$APP_PATH" -type f | head -20

      - name: Code sign (ad-hoc)
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"

          cat > build/ci-entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
            "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>com.apple.security.app-sandbox</key>
              <false/>
              <key>com.apple.security.device.audio-input</key>
              <true/>
              <key>com.apple.security.network.client</key>
              <true/>
              <key>com.apple.security.personal-information.speech-recognition</key>
              <true/>
          </dict>
          </plist>
          EOF

          codesign --force --deep --sign - \
            --entitlements build/ci-entitlements.plist \
            "$APP_PATH"

          echo "=== Signature verification ==="
          codesign --verify --deep --strict "$APP_PATH" && echo "Signature valid" || echo "Warning: signature check failed (expected for ad-hoc in CI)"

      - name: Create DMG installer
        working-directory: apps/BrainChat
        run: |
          APP_PATH="build/Brain Chat.app"
          DMG_NAME="BrainChat-$(date +%Y%m%d).dmg"
          DMG_PATH="build/${DMG_NAME}"
          STAGING="build/dmg-staging"

          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/"

          ln -s /Applications "$STAGING/Applications"

          hdiutil create \
            -volname "Brain Chat" \
            -srcfolder "$STAGING" \
            -ov \
            -format UDZO \
            -fs HFS+ \
            "$DMG_PATH"

          rm -rf "$STAGING"

          echo "=== DMG info ==="
          ls -lh "$DMG_PATH"

          MOUNT_OUT=$(hdiutil attach "$DMG_PATH" -nobrowse -noverify 2>&1)
          MOUNT_POINT=$(echo "$MOUNT_OUT" | grep -oE '/Volumes/[^\t]+' | head -1)
          if [ -n "$MOUNT_POINT" ]; then
            echo "DMG mounted at: $MOUNT_POINT"
            ls -la "$MOUNT_POINT/"
            hdiutil detach "$MOUNT_POINT" -quiet
          fi

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: BrainChat-app
          path: apps/BrainChat/build/Brain Chat.app
          retention-days: 30

      - name: Upload DMG installer
        uses: actions/upload-artifact@v4
        with:
          name: BrainChat-dmg
          path: apps/BrainChat/build/BrainChat-*.dmg
          retention-days: 30

      - name: Build summary
        if: always()
        working-directory: apps/BrainChat
        run: |
          echo "## BrainChat Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          APP_PATH="build/Brain Chat.app"
          if [ -d "$APP_PATH" ]; then
            BINARY_SIZE=$(du -sh "$APP_PATH/Contents/MacOS/BrainChat" 2>/dev/null | cut -f1 || echo "N/A")
            BUNDLE_SIZE=$(du -sh "$APP_PATH" 2>/dev/null | cut -f1 || echo "N/A")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Binary size | $BINARY_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Bundle size | $BUNDLE_SIZE |" >> $GITHUB_STEP_SUMMARY
            echo "| Platform | macOS ${{ env.MACOS_MIN }}+ |" >> $GITHUB_STEP_SUMMARY
            echo "| Architecture | arm64 |" >> $GITHUB_STEP_SUMMARY
            echo "| Signing | Ad-hoc |" >> $GITHUB_STEP_SUMMARY
          else
            echo "Build failed - no app bundle produced." >> $GITHUB_STEP_SUMMARY
          fi

          DMG=$(ls build/BrainChat-*.dmg 2>/dev/null | head -1)
          if [ -n "$DMG" ]; then
            DMG_SIZE=$(du -sh "$DMG" | cut -f1)
            echo "| DMG size | $DMG_SIZE |" >> $GITHUB_STEP_SUMMARY
          fi
