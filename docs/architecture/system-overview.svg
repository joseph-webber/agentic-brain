<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .component-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; font-weight: 600; fill: #1F2937; }
      .section-label { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 12px; font-weight: 500; fill: #6B7280; }
      .arrow { stroke-width: 2; marker-end: url(#arrowhead); }
      .connection { stroke-width: 1.5; stroke-dasharray: 5,5; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#6B7280" />
    </marker>
    <marker id="arrowhead-primary" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#8B5CF6" />
    </marker>
    <marker id="arrowhead-secondary" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#3B82F6" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="600" fill="#FFFFFF"/>

  <!-- Section: CLI/API Layer (Top) -->
  <g id="cli-api-layer">
    <rect x="300" y="20" width="200" height="60" rx="8" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="2"/>
    <text x="400" y="55" text-anchor="middle" class="component-label">CLI / API Gateway</text>
  </g>

  <!-- Arrow from CLI to Smart Router -->
  <line x1="400" y1="80" x2="400" y2="130" class="arrow" stroke="#8B5CF6" marker-end="url(#arrowhead-primary)"/>

  <!-- Section: Smart Router (Center) -->
  <g id="smart-router">
    <rect x="300" y="130" width="200" height="60" rx="8" fill="#3B82F6" opacity="0.1" stroke="#3B82F6" stroke-width="2"/>
    <text x="400" y="160" text-anchor="middle" class="component-label">Smart Router</text>
    <text x="400" y="178" text-anchor="middle" class="section-label">Request Routing &amp; Orchestration</text>
  </g>

  <!-- Arrows from Smart Router to LLM Providers -->
  <line x1="320" y1="190" x2="150" y2="250" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>
  <line x1="360" y1="190" x2="310" y2="250" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>
  <line x1="440" y1="190" x2="490" y2="250" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>
  <line x1="480" y1="190" x2="650" y2="250" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>

  <!-- Section: LLM Providers -->
  <g id="llm-providers">
    <!-- OpenAI -->
    <rect x="80" y="250" width="140" height="60" rx="8" fill="#F3F4F6" stroke="#8B5CF6" stroke-width="2"/>
    <text x="150" y="280" text-anchor="middle" class="component-label">OpenAI</text>
    <text x="150" y="298" text-anchor="middle" class="section-label">GPT-4, GPT-3.5</text>

    <!-- Claude -->
    <rect x="270" y="250" width="140" height="60" rx="8" fill="#F3F4F6" stroke="#8B5CF6" stroke-width="2"/>
    <text x="340" y="280" text-anchor="middle" class="component-label">Claude</text>
    <text x="340" y="298" text-anchor="middle" class="section-label">Anthropic</text>

    <!-- Ollama -->
    <rect x="460" y="250" width="140" height="60" rx="8" fill="#F3F4F6" stroke="#3B82F6" stroke-width="2"/>
    <text x="530" y="280" text-anchor="middle" class="component-label">Ollama</text>
    <text x="530" y="298" text-anchor="middle" class="section-label">Local Models</text>

    <!-- Groq -->
    <rect x="650" y="250" width="140" height="60" rx="8" fill="#F3F4F6" stroke="#10B981" stroke-width="2"/>
    <text x="720" y="280" text-anchor="middle" class="component-label">Groq</text>
    <text x="720" y="298" text-anchor="middle" class="section-label">Fast Inference</text>
  </g>

  <!-- Arrows from LLM Providers back to Smart Router (dotted return path) -->
  <path d="M 150 250 Q 150 220 400 190" class="connection" stroke="#6B7280" fill="none"/>
  <path d="M 340 250 Q 340 220 400 190" class="connection" stroke="#6B7280" fill="none"/>
  <path d="M 530 250 Q 530 220 400 190" class="connection" stroke="#6B7280" fill="none"/>
  <path d="M 720 250 Q 720 220 400 190" class="connection" stroke="#6B7280" fill="none"/>

  <!-- Arrow from Smart Router to RAG Engine -->
  <line x1="400" y1="190" x2="400" y2="350" class="arrow" stroke="#8B5CF6" marker-end="url(#arrowhead-primary)"/>

  <!-- Section: RAG Engine -->
  <g id="rag-engine">
    <rect x="300" y="350" width="200" height="60" rx="8" fill="#10B981" opacity="0.1" stroke="#10B981" stroke-width="2"/>
    <text x="400" y="380" text-anchor="middle" class="component-label">RAG Engine</text>
    <text x="400" y="398" text-anchor="middle" class="section-label">Knowledge Retrieval</text>
  </g>

  <!-- Arrows from RAG Engine to Databases -->
  <line x1="330" y1="410" x2="180" y2="460" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>
  <line x1="470" y1="410" x2="620" y2="460" class="arrow" stroke="#6B7280" marker-end="url(#arrowhead)"/>

  <!-- Bidirectional arrows for database communication -->
  <path d="M 180 460 Q 180 480 330 470" class="connection" stroke="#6B7280" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 620 460 Q 620 480 470 470" class="connection" stroke="#6B7280" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Section: Databases -->
  <g id="databases">
    <!-- Neo4j -->
    <rect x="80" y="460" width="200" height="60" rx="8" fill="#F3F4F6" stroke="#3B82F6" stroke-width="2"/>
    <text x="180" y="490" text-anchor="middle" class="component-label">Neo4j</text>
    <text x="180" y="508" text-anchor="middle" class="section-label">Graph Database</text>

    <!-- Vector DB -->
    <rect x="520" y="460" width="200" height="60" rx="8" fill="#F3F4F6" stroke="#10B981" stroke-width="2"/>
    <text x="620" y="490" text-anchor="middle" class="component-label">Vector DB</text>
    <text x="620" y="508" text-anchor="middle" class="section-label">Embeddings Storage</text>
  </g>

  <!-- Arrow from Databases to Redis Cache -->
  <line x1="180" y1="460" x2="300" y2="560" class="connection" stroke="#6B7280" fill="none"/>
  <line x1="620" y1="460" x2="500" y2="560" class="connection" stroke="#6B7280" fill="none"/>

  <!-- Section: Memory/Cache Layer (Bottom) -->
  <g id="cache-layer">
    <rect x="280" y="545" width="240" height="55" rx="8" fill="#F3F4F6" stroke="#8B5CF6" stroke-width="2"/>
    <text x="400" y="570" text-anchor="middle" class="component-label">Redis Cache / Memory Layer</text>
    <text x="400" y="588" text-anchor="middle" class="section-label">Session State &amp; Conversation History</text>
  </g>

  <!-- Bidirectional arrows: Cache to RAG Engine -->
  <path d="M 400 545 Q 400 520 400 410" class="connection" stroke="#8B5CF6" fill="none" marker-end="url(#arrowhead-primary)"/>

  <!-- Bidirectional arrows: Cache to Smart Router -->
  <path d="M 350 545 Q 350 300 380 190" class="connection" stroke="#8B5CF6" fill="none" marker-end="url(#arrowhead-primary)"/>

  <!-- Legend/Title -->
  <g id="title">
    <text x="20" y="30" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1F2937">Agentic Brain - System Architecture</text>
  </g>

  <!-- Legend Box -->
  <g id="legend">
    <rect x="20" y="545" width="240" height="55" rx="6" fill="#F3F4F6" stroke="#E5E7EB" stroke-width="1"/>
    <circle cx="35" cy="560" r="4" fill="#8B5CF6"/>
    <text x="50" y="565" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1F2937">Primary Data Flow</text>
    
    <circle cx="35" cy="580" r="4" fill="#6B7280" opacity="0.5"/>
    <text x="50" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="12" fill="#1F2937">Secondary Flow</text>
  </g>
</svg>